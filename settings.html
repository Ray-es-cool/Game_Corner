<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Settings</title>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-env.js"></script>
<script src="supabase-config.js"></script>
<script src="auth-adapter.js"></script>

<!-- Shared Styles & Animations -->
<link rel="stylesheet" href="styles.css">
<script src="animations.js"></script>

<script>
function applyTheme(){

let theme = localStorage.getItem("theme") || "dark";
let root = document.documentElement;

/* DARK */
if(theme === "dark"){
root.style.setProperty("--bg", "#000");
root.style.setProperty("--panel", "#0a0a0a");
root.style.setProperty("--card", "#1f2937");
root.style.setProperty("--accent", "#3b82f6");
root.style.setProperty("--text", "white");
}

/* LIGHT */
if(theme === "light"){
root.style.setProperty("--bg", "#f3f4f6");
root.style.setProperty("--panel", "#ffffff");
root.style.setProperty("--card", "#e5e7eb");
root.style.setProperty("--accent", "#2563eb");
root.style.setProperty("--text", "#111");
}

/* PINK */
if(theme === "pink"){
root.style.setProperty("--bg", "#1a001f");
root.style.setProperty("--panel", "#2a0a2f");
root.style.setProperty("--card", "#3b0f42");
root.style.setProperty("--accent", "#ff4fa3");
root.style.setProperty("--text", "white");
}

/* LIME */
if(theme === "lime"){
root.style.setProperty("--bg", "#0a1a0a");
root.style.setProperty("--panel", "#1a2f1a");
root.style.setProperty("--card", "#2d4a2d");
root.style.setProperty("--accent", "#4ade80");
root.style.setProperty("--text", "white");
}

/* RED */
if(theme === "red"){
root.style.setProperty("--bg", "#1a0a0a");
root.style.setProperty("--panel", "#2f1a1a");
root.style.setProperty("--card", "#4a2d2d");
root.style.setProperty("--accent", "#ef4444");
root.style.setProperty("--text", "white");
}

}
applyTheme();

window.addEventListener("storage",(e)=>{
if(e.key === "theme") applyTheme();
});
</script>

<style>
body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

/* NAV */
.nav{
width:80%;
margin:20px auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 30px;
border-radius:30px;
background:var(--panel);
box-shadow:0 0 20px rgba(59,130,246,0.4);
}

.nav-left{ width:120px; }

.nav-center{
display:flex;
gap:40px;
justify-content:center;
flex:1;
}

.nav-right{
width:120px;
display:flex;
justify-content:flex-end;
}

.nav a{
color:var(--text);
text-decoration:none;
font-size:18px;
padding:8px 14px;
border-radius:10px;
}

.nav a:hover{
background:var(--card);
}

/* USER */
.user-box{
display:flex;
align-items:center;
gap:10px;
}

.user-box img{
width:40px;
height:40px;
border-radius:50%;
}

/* MAIN */
.main{
width:80%;
margin:auto;
margin-top:40px;
display:flex;
justify-content:center;
}

.settings-box{
width:500px;
padding:30px;
border-radius:25px;
background:var(--panel);
box-shadow:0 0 25px rgba(59,130,246,0.4);
text-align:center;
}

.setting-btn{
display:block;
width:100%;
margin:15px 0;
padding:15px;
font-size:18px;
border:none;
border-radius:15px;
background:var(--card);
color:var(--text);
cursor:pointer;
}


input[type="range"]{
width:100%;
margin-top:15px;
}

.token{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:32px;
}

.theme-selector{
display:flex;
gap:10px;
justify-content:center;
margin-top:15px;
}

.theme-btn{
flex:1;
padding:15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.theme-btn.dark{
background:#1a1a2e;
color:white;
}

.theme-btn.light{
background:#f0f0f0;
color:#333;
}

.theme-btn.pink{
background:#2d1b33;
color:#ff69b4;
}

.theme-btn.lime{
background:#1a2f1a;
color:#4ade80;
}

.theme-btn.red{
background:#2f1a1a;
color:#ef4444;
}

.theme-btn.active{
border:3px solid var(--accent);
}

h3{
margin-top:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">

<div class="nav-left"></div>

<div class="nav-center">
<a href="index.html">Home</a>
<a href="Games.html">Games</a>
<a href="DailyRewards.html">Daily Rewards</a>
<a href="shop.html">Shop</a>
<a href="settings.html">Settings</a>
</div>

<div class="nav-right">
<div class="user-box" id="userBox"></div>
</div>

</div>

<!-- MAIN -->
<div class="main">
<div class="settings-box">

<h1>Settings</h1>

<h3>Theme</h3>
<div class="theme-selector">
    <button class="theme-btn dark" onclick="setTheme('dark')">Dark</button>
    <button class="theme-btn light" onclick="setTheme('light')">Light</button>
    <button class="theme-btn pink" onclick="setTheme('pink')">Pink</button>
    <button class="theme-btn red" onclick="setTheme('red')" id="redThemeBtn" style="display:none;">Red</button>
    <button class="theme-btn lime" onclick="setTheme('lime')" id="limeThemeBtn" style="display:none;">Lime</button>
</div>

<h3>Music Volume</h3>
<input type="range" min="0" max="1" step="0.01" id="volume">

<br><br>

<button class="setting-btn" onclick="goMusic()">🎵 Music Player</button>

</div>
</div>

<div class="token" id="tokens">🪙 0</div>

<script src="music-engine.js"></script>

<script>

/* =========================
   USER SYSTEM
========================= */
let currentUser = localStorage.getItem("currentUser");

/* USER UI */
function loadUser(){
    let box = document.getElementById("userBox");
    if(!box || !currentUser) return;

    box.innerHTML = `
        <span>${currentUser}</span>
        <button onclick="logoutUser()"
        style="padding:6px 10px;background:#ef4444;border:none;border-radius:6px;color:white;cursor:pointer;">
        Logout
        </button>
    `;
}

function logoutUser(){
    if(window.FireDB) FireDB.logout();
    localStorage.removeItem("currentUser");
    localStorage.removeItem("currentUid");
    currentUser = null;
    localStorage.setItem("userSync", Date.now());
    location.reload();
}

/* TOKENS */
function loadTokens(){
    if(!currentUser) return;
    let t = localStorage.getItem(currentUser+"_tokens") || 0;
    document.getElementById("tokens").innerText = "🪙 " + t;
}

/* NAVIGATION */
function goMusic(){
    window.location.href = "Music.html";
}

/* THEME */
function setTheme(theme){
    localStorage.setItem("theme", theme);
    applyTheme();
    localStorage.setItem("themeSync", Date.now());

    // Update active state
    document.querySelectorAll(".theme-btn").forEach(btn => {
        btn.classList.remove("active");
    });
    document.querySelector(".theme-btn." + theme).classList.add("active");
}

/* VOLUME */
const slider = document.getElementById("volume");

function syncVolume(){
    let v = localStorage.getItem("volume");
    if(v === null) v = 0.5;

    if(slider) slider.value = v;

    if(window.globalAudio){
        window.globalAudio.volume = parseFloat(v);
    }
}

if(slider){
    slider.addEventListener("input",(e)=>{
        let v = parseFloat(e.target.value);
        localStorage.setItem("volume", v);

        if(window.globalAudio){
            window.globalAudio.volume = v;
        }
    });
}

window.addEventListener("storage",(e)=>{
    if(e.key === "volume"){
        syncVolume();
    }
    if(e.key === "theme"){
        applyTheme();
    }
    if(e.key === "userSync"){
        location.reload();
    }
    if(e.key === "tokenSync"){
        loadTokens();
    }
});

/* INIT */
document.addEventListener("DOMContentLoaded", async ()=>{
    loadUser();
    loadTokens();
    syncVolume();

    // Load owned themes from Firebase (or localStorage fallback)
    if(currentUser && currentUid){
        let ownedThemes = [];
        try {
            ownedThemes = await FireDB.getUserThemes(currentUid) || [];
        } catch(e) {
            ownedThemes = JSON.parse(localStorage.getItem(currentUser+"_themes") || "[]");
        }

        if(ownedThemes.includes("red")){
            document.getElementById("redThemeBtn").style.display = "block";
        }
        if(ownedThemes.includes("lime")){
            document.getElementById("limeThemeBtn").style.display = "block";
        }
    }

    // Set active theme button
    let currentTheme = localStorage.getItem("theme") || "dark";
    document.querySelectorAll(".theme-btn").forEach(btn => {
        btn.classList.remove("active");
    });
    const activeBtn = document.querySelector(".theme-btn." + currentTheme);
    if(activeBtn) activeBtn.classList.add("active");
});

</script>

</body>
</html>
