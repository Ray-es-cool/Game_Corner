<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shop</title>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-env.js"></script>
<script src="supabase-config.js"></script>
<script src="auth-adapter.js"></script>

<!-- Shared Styles & Animations -->
<link rel="stylesheet" href="styles.css">
<script src="animations.js"></script>

<script>
function applyTheme(){
    let theme = localStorage.getItem("theme") || "dark";
    let root = document.documentElement;

    if(theme === "dark"){
        root.style.setProperty("--bg", "#000");
        root.style.setProperty("--panel", "#0a0a0a");
        root.style.setProperty("--card", "#1f2937");
        root.style.setProperty("--accent", "#3b82f6");
        root.style.setProperty("--text", "white");
    }

    if(theme === "light"){
        root.style.setProperty("--bg", "#f3f4f6");
        root.style.setProperty("--panel", "#ffffff");
        root.style.setProperty("--card", "#e5e7eb");
        root.style.setProperty("--accent", "#2563eb");
        root.style.setProperty("--text", "#111");
    }

    if(theme === "pink"){
        root.style.setProperty("--bg", "#1a001f");
        root.style.setProperty("--panel", "#2a0a2f");
        root.style.setProperty("--card", "#3b0f42");
        root.style.setProperty("--accent", "#ff4fa3");
        root.style.setProperty("--text", "white");
    }
}
applyTheme();

window.addEventListener("storage",(e)=>{
    if(e.key === "theme") applyTheme();
});
</script>

<style>
body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

.nav{
width:80%;
margin:20px auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
border-radius:30px;
background:var(--panel);
box-shadow:0 0 20px rgba(59,130,246,0.4);
}

.nav-center{
display:flex;
gap:30px;
margin:auto;
}

.nav a{
color:var(--text);
text-decoration:none;
padding:8px 14px;
border-radius:10px;
}

.nav a:hover{
background:var(--card);
}

.user-box{
display:flex;
align-items:center;
gap:10px;
}

.main{
width:80%;
margin:auto;
}

.title{
text-align:center;
font-size:40px;
margin-top:20px;
}

.shop-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.item{
background:var(--panel);
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px rgba(59,130,246,0.2);
}

.item h3{
margin-bottom:10px;
}

.item button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
cursor:pointer;
width:100%;
}

.item button:disabled{
opacity:0.5;
cursor:not-allowed;
}

/* Shop item hover - enhanced with shared styles */
.item:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
}

.token{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:32px;
}

.empty-msg{
text-align:center;
padding:40px;
opacity:0.7;
font-size:18px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div></div>

<div class="nav-center">
<a href="index.html">Home</a>
<a href="Games.html">Games</a>
<a href="DailyRewards.html">Daily Rewards</a>
<a href="settings.html">Settings</a>
<a href="shop.html">Shop</a>
</div>

<div class="user-box" id="userBox"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="title">Shop</div>

<div class="shop-grid" id="shopGrid">
    <!-- Red Theme -->
    <div class="item">
        <div style="width:60px;height:60px;border-radius:50%;background:#ef4444;margin:0 auto 15px;box-shadow:0 0 20px rgba(239,68,68,0.6);"></div>
        <h3>Red Theme</h3>
        <p>Bold red gaming theme</p>
        <p style="font-size:18px;font-weight:bold;color:#ef4444;">🪙 100</p>
        <button onclick="buyRedTheme()" id="buyRedBtn">Buy Now</button>
    </div>

    <!-- Lime Green Theme -->
    <div class="item">
        <div style="width:60px;height:60px;border-radius:50%;background:#4ade80;margin:0 auto 15px;box-shadow:0 0 20px rgba(74,222,128,0.6);"></div>
        <h3>Lime Theme</h3>
        <p>Vibrant lime green theme</p>
        <p style="font-size:18px;font-weight:bold;color:#4ade80;">🪙 500</p>
        <button onclick="buyLimeTheme()" id="buyLimeBtn">Buy Now</button>
    </div>
</div>

</div>

<div class="token" id="tokens">🪙 0</div>

<script>

/* =========================
   USER SYSTEM
========================= */
let currentUser = localStorage.getItem("currentUser");
let currentUid = localStorage.getItem("currentUid");

function loadUserUI(){
    let box = document.getElementById("userBox");

    if(!box) return;

    if(currentUser){
        box.innerHTML = `
            <span>${currentUser}</span>
            <button onclick="logoutUser()"
            style="padding:6px 10px;background:#ef4444;border:none;border-radius:6px;color:white;cursor:pointer;">
            Logout
            </button>
        `;
    } else {
        box.innerHTML = `<a href="login.html">Login</a>`;
    }
}

function logoutUser(){
    if(window.FireDB) FireDB.logout();
    localStorage.removeItem("currentUser");
    localStorage.removeItem("currentUid");
    currentUser = null;
    localStorage.setItem("userSync", Date.now());
    location.reload();
}

/* =========================
   TOKENS
========================= */
function loadTokens(){
    let el = document.getElementById("tokens");
    if(!el || !currentUser) return;

    el.innerText = "🪙 " + (localStorage.getItem(currentUser+"_tokens") || 0);
}

window.addEventListener("storage",(e)=>{
    if(e.key === "tokenSync"){
        loadTokens();
    }
    if(e.key === "theme"){
        applyTheme();
    }
});

/* =========================
   SHOP FUNCTIONS (Firebase + LocalStorage)
========================= */
async function buyRedTheme(){
    if(!currentUser || !currentUid){
        alert("Login required to purchase items");
        window.location.href = "login.html";
        return;
    }

    const currentTokens = parseInt(localStorage.getItem(currentUser+"_tokens") || 0);
    const price = 100;

    if(currentTokens < price){
        alert("Not enough tokens! You need 100 tokens.");
        return;
    }

    // Check if already owned (check Firebase first, then localStorage)
    let ownedThemes = [];
    try {
        ownedThemes = await FireDB.getUserThemes(currentUid) || [];
    } catch(e) {
        ownedThemes = JSON.parse(localStorage.getItem(currentUser+"_themes") || "[]");
    }

    if(ownedThemes.includes("red")){
        alert("You already own the Red theme!");
        return;
    }

    // Deduct tokens (Firebase + localStorage)
    const newTokens = currentTokens - price;
    localStorage.setItem(currentUser+"_tokens", newTokens);
    localStorage.setItem("tokenSync", Date.now());

    // Save to Firebase
    try {
        await FireDB.updateTokens(currentUid, newTokens);
        await FireDB.addUserTheme(currentUid, "red");
    } catch(e) {
        // Fallback to localStorage if Firebase fails
        ownedThemes.push("red");
        localStorage.setItem(currentUser+"_themes", JSON.stringify(ownedThemes));
    }

    alert("🎉 Red theme purchased! Check it out in Settings > Themes");
    loadTokens();
}

async function buyLimeTheme(){
    if(!currentUser || !currentUid){
        alert("Login required to purchase items");
        window.location.href = "login.html";
        return;
    }

    const currentTokens = parseInt(localStorage.getItem(currentUser+"_tokens") || 0);
    const price = 500;

    if(currentTokens < price){
        alert("Not enough tokens! You need 500 tokens.");
        return;
    }

    // Check if already owned (check Firebase first, then localStorage)
    let ownedThemes = [];
    try {
        ownedThemes = await FireDB.getUserThemes(currentUid) || [];
    } catch(e) {
        ownedThemes = JSON.parse(localStorage.getItem(currentUser+"_themes") || "[]");
    }

    if(ownedThemes.includes("lime")){
        alert("You already own the Lime theme!");
        return;
    }

    // Deduct tokens (Firebase + localStorage)
    const newTokens = currentTokens - price;
    localStorage.setItem(currentUser+"_tokens", newTokens);
    localStorage.setItem("tokenSync", Date.now());

    // Save to Firebase
    try {
        await FireDB.updateTokens(currentUid, newTokens);
        await FireDB.addUserTheme(currentUid, "lime");
    } catch(e) {
        // Fallback to localStorage if Firebase fails
        ownedThemes.push("lime");
        localStorage.setItem(currentUser+"_themes", JSON.stringify(ownedThemes));
    }

    alert("🎉 Lime theme purchased! Check it out in Settings > Themes");
    loadTokens();
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", ()=>{
    loadUserUI();
    loadTokens();

    // Check if already owned and disable buttons
    if(currentUser){
        const ownedThemes = JSON.parse(localStorage.getItem(currentUser+"_themes") || "[]");

        if(ownedThemes.includes("red")){
            const btn = document.getElementById("buyRedBtn");
            if(btn){
                btn.disabled = true;
                btn.innerText = "Already Owned";
            }
        }

        if(ownedThemes.includes("lime")){
            const btn = document.getElementById("buyLimeBtn");
            if(btn){
                btn.disabled = true;
                btn.innerText = "Already Owned";
            }
        }
    }
});

</script>

</body>
</html>
