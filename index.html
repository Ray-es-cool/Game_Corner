<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title id="siteTitle">Home</title>

<script>
function applyTheme(){
    let theme = localStorage.getItem("theme") || "dark";
    let root = document.documentElement;

    if(theme === "dark"){
        root.style.setProperty("--bg","#000");
        root.style.setProperty("--panel","#0a0a0a");
        root.style.setProperty("--card","#1f2937");
        root.style.setProperty("--accent","#3b82f6");
        root.style.setProperty("--text","white");
    }
    if(theme === "light"){
        root.style.setProperty("--bg","#f3f4f6");
        root.style.setProperty("--panel","#ffffff");
        root.style.setProperty("--card","#e5e7eb");
        root.style.setProperty("--accent","#2563eb");
        root.style.setProperty("--text","#111");
    }
    if(theme === "pink"){
        root.style.setProperty("--bg","#1a001f");
        root.style.setProperty("--panel","#2a0a2f");
        root.style.setProperty("--card","#3b0f42");
        root.style.setProperty("--accent","#ff4fa3");
        root.style.setProperty("--text","white");
    }
}

applyTheme();
window.addEventListener("storage", (e)=>{
    if(e.key==="theme") applyTheme();
});
</script>

<style>
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text);}

/* NAVIGATION */
.nav{
    width:80%;
    margin:20px auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    border-radius:30px;
    background:var(--panel);
    box-shadow:0 0 20px rgba(59,130,246,0.4);
}
.nav-center{display:flex;gap:40px;margin:auto;}
.nav a{color:var(--text);text-decoration:none;font-size:18px;padding:8px 14px;border-radius:10px;}
.nav a:hover{background:var(--card);}
.user-box{display:flex;align-items:center;gap:10px;}
.user-box img{width:40px;height:40px;border-radius:50%;}

/* MAIN LAYOUT */
.main{
    width:80%;
    margin:auto;
    display:flex;
    gap:40px;
}

/* LEFT PANEL */
.left{
    width:260px;
    display:flex;
    flex-direction:column;
    gap:20px;
}
.box{
    background:var(--panel);
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 15px rgba(59,130,246,0.2);
}
.logo-box{
    height:220px;
    display:flex;
    align-items:center;
    justify-content:center;
}
.logo-box img{
    width:180px;
    height:180px;
    border-radius:25px;
    object-fit:cover;
    background:var(--card);
    box-shadow:0 0 25px rgba(59,130,246,0.4);
}

/* CENTER */
.center{flex:1;}
.title{text-align:center;font-size:60px;margin-bottom:20px;}
#sloganText{text-align:center;font-size:22px;color:var(--text);opacity:0.7;margin-bottom:30px;}

/* GAMES */
.games-section{
    background:var(--panel);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(59,130,246,0.2);
}
.games{display:flex;gap:15px;margin-top:20px;}
.game{
    flex:1;
    background:var(--card);
    padding:20px;
    border-radius:15px;
    text-align:center;
    transition:0.2s;
}
.game:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(59,130,246,0.5);
}

/* ADMIN PANEL */
.admin{
    display:none;
    margin-top:30px;
    background:var(--panel);
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(59,130,246,0.3);
    max-width:500px;
}
.admin input,.admin textarea{
    width:100%;
    margin-top:10px;
    padding:8px;
    background:var(--card);
    border:none;
    border-radius:8px;
    color:var(--text);
}
.admin button{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:var(--accent);
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;

/* TOKEN DISPLAY */
.token{
    position:fixed;
    bottom:20px;
    left:50%;

<body>

<div class="nav">
    <div></div>
    <div class="nav-center">
        <a href="index.html">Home</a>

<div class="token" id="tokens">🪙 0</div>

<!-- 🎧 MUSIC ENGINE -->
<script src="music-engine.js"></script>
<script src="user-helper.js"></script>

<script>

function getTopGames(){
    let games = JSON.parse(localStorage.getItem("games")) || [];
    return games
        .map((g, i) => ({...g, slotIndex:i}))
        .filter(g => g && g.name)
        .sort((a,b)=>(b.players||0)-(a.players||0))
        .slice(0,4);
}

function canPlayGames(){
    let users = getUsers();
    return !!(currentUser && users[currentUser]);
}

function openGame(slotIndex){
    if(!canPlayGames()){
        alert("Please log in or create an account to play games.");
        window.location.href = "login.html";
        return;
    }
    window.location.href = "Games.html?play=" + slotIndex;
}

function renderRecommendedGames(){
    let gamesWrap = document.querySelector(".games");
    if(!gamesWrap) return;

    let topGames = getTopGames();

    if(topGames.length===0){
        gamesWrap.innerHTML = `
            <div class="game">No games played yet</div>
            <div class="game">No games played yet</div>
            <div class="game">No games played yet</div>
            <div class="game">No games played yet</div>
        `;
        return;
    }

    let cards = topGames.map((g, idx) => `
        <div class="game">
            <div><strong>#${idx+1} ${g.name}</strong></div>
            <div style="margin-top:8px;">👥 ${g.players||0} plays</div>
            <button style="margin-top:10px;padding:8px 12px;border:none;border-radius:8px;background:var(--accent);color:white;${canPlayGames() ? "cursor:pointer;" : "cursor:not-allowed;opacity:0.6;"}" onclick="openGame(${g.slotIndex})" ${canPlayGames() ? "" : "disabled"}>${canPlayGames() ? "Play" : "Login Required"}</button>
        </div>
    `);

    while(cards.length < 4){
        cards.push(`<div class="game">Waiting for more games</div>`);
    }

    gamesWrap.innerHTML = cards.join("");
}

/* =========================
   SITE SYSTEM (SERVER API)
========================= */
async function loadSite(){
    try {
        const response = await fetch("http://localhost:3000/api/site");
        const data = await response.json();
        
        if(data){
            apply({
                title: data.title || "Home",
                logo: data.logo || "https://via.placeholder.com/200",
                updates: data.updates || "- Ready",
                slogan: data.slogan || "Play. Learn. Repeat"
            });
        }
    } catch(err){
        console.error("Error loading site:", err);
        // Fallback to defaults
        apply({
            title: "Home",
            logo: "https://via.placeholder.com/200",
            updates: "- Ready",
            slogan: "Play. Learn. Repeat"
        });
    }
}

function apply(d){
    document.getElementById("siteName").innerText=d.title;
    document.getElementById("siteTitle").innerText=d.title;
    document.getElementById("logoImg").src=d.logo;
    document.getElementById("updatesText").innerHTML=d.updates;
    document.getElementById("sloganText").innerText=d.slogan;
}

/* =========================
   ADMIN SAVE (SERVER API)
========================= */
async function save(){
    if(currentUser!=="CritStrike") {
        alert("Only CritStrike can edit site settings");
        return;
    }

    let title = document.getElementById("titleInput").value;
    let updates = document.getElementById("updatesInput").value;
    let slogan = document.getElementById("sloganInput").value;

    let file = document.getElementById("logoFile").files[0];
    let logo = null;

    if(file){
        logo = await new Promise((resolve) => {
            let reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsDataURL(file);
        });
    }

    try {
        const response = await fetch("http://localhost:3000/api/site", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                user: "CritStrike",
                title: title,
                logo: logo || document.getElementById("logoImg").src,
                updates: updates,
                slogan: slogan
            })
        });

        const result = await response.json();
        if(result.success){
            alert("Site updated!");
            loadSite();
        } else {
            alert("Failed to update: " + result.error);
        }
    } catch(err){
        alert("Error: " + err.message);
    }
}

/* =========================
   INIT
========================= */
(async function(){
    await loadSite();
    renderRecommendedGames();
    // User display is now handled by user-helper.js
})();

window.addEventListener("storage",(e)=>{
    if(e.key==="games") renderRecommendedGames();
});

window.addEventListener("focus", renderRecommendedGames);

/* =========================
   GLOBAL MUSIC SYSTEM (SYNCED)
========================= */
let globalAudio;

function initGlobalMusic(){
    if(window.globalAudio) return;

    globalAudio = new Audio();
    globalAudio.loop = true;

    let playlist = JSON.parse(localStorage.getItem("playlist"))||[];
    let track = parseInt(localStorage.getItem("track"))||0;
    let volume = parseFloat(localStorage.getItem("volume"))||0.5;

    if(playlist.length){
        let song = playlist[track];
        globalAudio.src = song.data||song;
        globalAudio.volume = volume;

        // SYNC position with other pages
        let savedTime = parseFloat(localStorage.getItem("musicTime"))||0;
        globalAudio.currentTime = savedTime;
    }

    if(localStorage.getItem("musicPlaying")==="true"){
        globalAudio.play().catch(()=>{});
    }

    document.addEventListener("click", ()=>{globalAudio.play().catch(()=>{});},{once:true});
    window.globalAudio = globalAudio;

    // SAVE playback every 0.5s
    setInterval(()=>{
        if(globalAudio.src && !isNaN(globalAudio.currentTime)){
            localStorage.setItem("track", track);
            localStorage.setItem("musicTime", globalAudio.currentTime);
        }
    },500);
}

initGlobalMusic();
</script>
