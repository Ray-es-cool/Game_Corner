<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title id="siteTitle">Home</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:white;}

/* NAV */
.nav{
width:80%;
margin:20px auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
border-radius:30px;
background:#0a0a0a;
box-shadow:0 0 20px rgba(59,130,246,0.4);
}
.nav-center{display:flex;gap:30px;margin:auto;}
.nav a{color:white;text-decoration:none;padding:8px 14px;border-radius:10px;}
.nav a:hover{background:#1f2937;}
.user-box{display:flex;align-items:center;gap:10px;}

/* MAIN */
.main{width:80%;margin:auto;display:flex;gap:40px;}

.left{width:260px;display:flex;flex-direction:column;gap:20px;}

.box{
background:#0a0a0a;
border-radius:20px;
padding:20px;
box-shadow:0 0 15px rgba(59,130,246,0.2);
}

.logo-box{height:220px;display:flex;align-items:center;justify-content:center;}
.logo-box img{width:180px;height:180px;border-radius:25px;background:#1f2937;}

.center{flex:1;}
.title{text-align:center;font-size:50px;margin-bottom:10px;}
#sloganText{text-align:center;opacity:0.7;margin-bottom:20px;}

.games-section{
background:#0a0a0a;
padding:20px;
border-radius:20px;
}

.games{display:flex;gap:10px;margin-top:10px;}

.game{
flex:1;
background:#1f2937;
padding:15px;
border-radius:10px;
text-align:center;
}

.admin{
display:none;
margin-top:20px;
background:#0a0a0a;
padding:15px;
border-radius:15px;
}

.token{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:30px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div></div>

<div class="nav-center">
<a href="index.html">Home</a>
<a href="Games.html">Games</a>
<a href="DailyRewards.html">Daily Rewards</a>
<a href="shop.html">Shop</a>
<a href="settings.html">Settings</a>
<a href="login.html">Login</a>
</div>

<div class="user-box" id="userBox"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="left">
<div class="box logo-box">
<img id="logoImg" src="https://via.placeholder.com/200">
</div>

<div class="box">
<h3>Updates</h3>
<p id="updatesText">Loading...</p>
</div>
</div>

<div class="center">

<div class="title" id="siteName">Home</div>
<div id="sloganText">Play. Learn. Repeat</div>

<div class="games-section">
<h2>Recommended Games</h2>

<div class="games"></div>

<div class="admin">
<h3>Admin Panel (Game_Master Only)</h3>
<input id="titleInput" placeholder="Title">
<input id="sloganInput" placeholder="Slogan">
<textarea id="updatesInput"></textarea>
<input type="file" id="logoFile">
<button onclick="save()">Save</button>
</div>

</div>

</div>
</div>

<div class="token" id="tokens">🪙 0</div>

<script src="music-engine.js"></script>
<script src="user-helper.js"></script>

<script>

/* =========================
   GAMES
========================= */
function getTopGames(){
let games = JSON.parse(localStorage.getItem("games")) || [];
return games
.map((g,i)=>({...g,slotIndex:i}))
.filter(g=>g && g.name)
.sort((a,b)=>(b.players||0)-(a.players||0))
.slice(0,4);
}

function canPlayGames(){
return !!localStorage.getItem("currentUser");
}

function openGame(i){
if(!canPlayGames()){
alert("Login required");
window.location.href="login.html";
return;
}
window.location.href="Games.html?play="+i;
}

function renderRecommendedGames(){
let wrap=document.querySelector(".games");
if(!wrap) return;

let top=getTopGames();

if(top.length===0){
wrap.innerHTML="<div>No games yet</div>";
return;
}

wrap.innerHTML=top.map((g,i)=>`
<div class="game">
<strong>#${i+1} ${g.name}</strong>
<p>👥 ${g.players||0}</p>
<button onclick="openGame(${g.slotIndex})">
${canPlayGames()?"Play":"Login Required"}
</button>
</div>
`).join("");
}

/* =========================
   SITE API
========================= */
async function loadSite(){
try{
let r=await fetch("/api/site");
let d=await r.json();

apply({
title:d.title||"Home",
logo:d.logo||"https://via.placeholder.com/200",
updates:d.updates||"- Ready",
slogan:d.slogan||"Play. Learn. Repeat"
});
}catch{
apply({
title:"Home",
logo:"https://via.placeholder.com/200",
updates:"- Ready",
slogan:"Play. Learn. Repeat"
});
}
}

function apply(d){
let el;

el=document.getElementById("siteName");
if(el) el.innerText=d.title;

el=document.getElementById("siteTitle");
if(el) el.innerText=d.title;

el=document.getElementById("logoImg");
if(el) el.src=d.logo;

el=document.getElementById("updatesText");
if(el) el.innerHTML=d.updates;

el=document.getElementById("sloganText");
if(el) el.innerText=d.slogan;
}

/* =========================
   ADMIN SAVE
========================= */
async function save(){

let currentUser = localStorage.getItem("currentUser");

if(currentUser!=="Game_Master"){
alert("Admin only");
return;
}

let title=document.getElementById("titleInput").value;
let updates=document.getElementById("updatesInput").value;
let slogan=document.getElementById("sloganInput").value;

let file=document.getElementById("logoFile").files[0];
let logo=null;

if(file){
logo=await new Promise(res=>{
let r=new FileReader();
r.onload=e=>res(e.target.result);
r.readAsDataURL(file);
});
}

await fetch("/api/site",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user:"Game_Master",
title,
logo:logo||document.getElementById("logoImg").src,
updates,
slogan
})
});

alert("Saved");
loadSite();
}

/* =========================
   GLOBAL MUSIC (FIXED FULL SYNC)
========================= */
(function(){
if(window.globalAudio) return;

let a=new Audio();
a.loop=true;

let playlist=JSON.parse(localStorage.getItem("playlist"))||[];
let track=parseInt(localStorage.getItem("track"))||0;
let volume=parseFloat(localStorage.getItem("volume"))||0.5;

if(playlist.length){
a.src=playlist[track].data||playlist[track];
a.currentTime=parseFloat(localStorage.getItem("musicTime"))||0;
a.volume=volume;
}

if(localStorage.getItem("musicPlaying")==="true"){
a.play().catch(()=>{});
}

document.addEventListener("click",()=>a.play().catch(()=>{}),{once:true});

setInterval(()=>{
if(!isNaN(a.currentTime)){
localStorage.setItem("musicTime",a.currentTime);
localStorage.setItem("track",track);
}
},500);

window.globalAudio=a;
})();

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", async ()=>{
await loadSite();
renderRecommendedGames();
});

</script>

</body>
</html>
