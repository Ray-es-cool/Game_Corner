<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title id="siteTitle">Home</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase-env.js"></script>
<script src="firebase-config.js"></script>

<!-- Shared Styles & Animations -->
<link rel="stylesheet" href="styles.css">
<script src="animations.js"></script>

<script>
function applyTheme(){
    let theme = localStorage.getItem("theme") || "dark";
    let root = document.documentElement;

    if(theme === "dark"){
        root.style.setProperty("--bg", "#000");
        root.style.setProperty("--panel", "#0a0a0a");
        root.style.setProperty("--card", "#1f2937");
        root.style.setProperty("--accent", "#3b82f6");
        root.style.setProperty("--text", "white");
    }

    if(theme === "light"){
        root.style.setProperty("--bg", "#f3f4f6");
        root.style.setProperty("--panel", "#ffffff");
        root.style.setProperty("--card", "#e5e7eb");
        root.style.setProperty("--accent", "#2563eb");
        root.style.setProperty("--text", "#111");
    }

    if(theme === "pink"){
        root.style.setProperty("--bg", "#1a001f");
        root.style.setProperty("--panel", "#2a0a2f");
        root.style.setProperty("--card", "#3b0f42");
        root.style.setProperty("--accent", "#ff4fa3");
        root.style.setProperty("--text", "white");
    }
}
applyTheme();

window.addEventListener("storage", (e)=>{
    if(e.key === "theme") applyTheme();
});
</script>

<style>
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text);}

/* NAV */
.nav{
width:80%;
margin:20px auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
border-radius:30px;
background:var(--panel);
box-shadow:0 0 20px rgba(59,130,246,0.4);
}
.nav-center{display:flex;gap:30px;margin:auto;}
.nav a{color:var(--text);text-decoration:none;padding:8px 14px;border-radius:10px;}
.nav a:hover{background:var(--card);}

/* Page-specific: games grid animation */
.games{display:flex;gap:10px;margin-top:10px;}
.game{flex:1;animation:scaleIn 0.3s ease-out backwards;}
.game:nth-child(1){animation-delay:0.1s;}
.game:nth-child(2){animation-delay:0.15s;}
.game:nth-child(3){animation-delay:0.2s;}
.game:nth-child(4){animation-delay:0.25s;}
.user-box{display:flex;align-items:center;gap:10px;}

/* MAIN */
.main{width:80%;margin:auto;display:flex;gap:40px;}

.left{width:260px;display:flex;flex-direction:column;gap:20px;}

.box{
background:var(--panel);
border-radius:20px;
padding:20px;
box-shadow:0 0 15px rgba(59,130,246,0.2);
}

.logo-box{height:220px;display:flex;align-items:center;justify-content:center;}
.logo-box img{width:180px;height:180px;border-radius:25px;background:var(--card);}

.center{flex:1;}
.title{text-align:center;font-size:50px;margin-bottom:10px;}
#sloganText{text-align:center;opacity:0.7;margin-bottom:20px;}

.games-section{
background:var(--panel);
padding:20px;
border-radius:20px;
}

.games{display:flex;gap:10px;margin-top:10px;}

.game{
flex:1;
background:var(--card);
padding:15px;
border-radius:10px;
text-align:center;
}

.admin{
display:none;
margin-top:20px;
background:var(--card);
padding:15px;
border-radius:15px;
}

.admin input, .admin textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:none;
background:var(--bg);
color:var(--text);
box-sizing:border-box;
}

.admin textarea{
min-height:80px;
resize:vertical;
}

.admin button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
cursor:pointer;
margin-top:10px;
font-size:16px;
}

.token{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:30px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div></div>

<div class="nav-center">
<a href="index.html">Home</a>
<a href="Games.html">Games</a>
<a href="DailyRewards.html">Daily Rewards</a>
<a href="shop.html">Shop</a>
<a href="settings.html">Settings</a>
<a href="login.html" id="loginLink">Login</a>
</div>

<div class="user-box" id="userBox"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="left">
<div class="box logo-box">
<img id="logoImg" src="https://via.placeholder.com/200">
</div>

<div class="box">
<h3>Updates</h3>
<p id="updatesText">Loading...</p>
</div>
</div>

<div class="center">

<div class="title" id="siteName">Home</div>
<div id="sloganText">Play. Learn. Repeat</div>

<div class="games-section">
<h2>Recommended Games</h2>

<div class="games" id="gamesContainer">
<!-- Games rendered here -->
</div>

<div class="admin" id="adminPanel">
<h3>Admin Panel (Game_Master Only)</h3>
<label>Site Title</label>
<input id="titleInput" placeholder="Title">
<label>Slogan</label>
<input id="sloganInput" placeholder="Slogan">
<label>Updates (HTML allowed)</label>
<textarea id="updatesInput"></textarea>
<label>Logo URL</label>
<input id="logoInput" type="text" placeholder="https://...">
<button onclick="save()">Save Site Settings</button>
</div>

</div>

</div>
</div>

<div class="token" id="tokens">🪙 0</div>

<script>

/* =========================
   USER STATE
========================= */
let currentUser = localStorage.getItem("currentUser");
let currentUid = localStorage.getItem("currentUid");
let isAdminUser = false;

function loadUserUI(){
    let box = document.getElementById("userBox");
    let loginLink = document.getElementById("loginLink");

    if(!box) return;

    if(currentUser){
        box.innerHTML = `
            <span>${currentUser}</span>
            <button onclick="logoutUser()"
            style="padding:6px 10px;background:#ef4444;border:none;border-radius:6px;color:white;cursor:pointer;">
            Logout
            </button>
        `;
        if(loginLink) loginLink.style.display = "none";
    } else {
        box.innerHTML = "";
        if(loginLink) loginLink.style.display = "block";
    }
}

function logoutUser(){
    if(window.FireDB) FireDB.logout();
    localStorage.removeItem("currentUser");
    localStorage.removeItem("currentUid");
    currentUser = null;
    localStorage.setItem("userSync", Date.now());
    location.reload();
}

function loadTokens(){
    let el = document.getElementById("tokens");
    if(!el || !currentUser) return;
    el.innerText = "🪙 " + (localStorage.getItem(currentUser+"_tokens") || 0);
}

async function resolveAdmin(){
    isAdminUser = false;
    if(!currentUser || !currentUid || !window.FireDB) return false;
    try{
        const data = await FireDB.getUserData(currentUid);
        isAdminUser = (data?.username === "Game_Master" && currentUser === "Game_Master");
        return isAdminUser;
    }catch(_){
        isAdminUser = false;
        return false;
    }
}

/* =========================
   SITE SETTINGS
========================= */
async function loadSite(){
    try{
        const data = await FireDB.getSiteSettings();

        apply({
            title: data.title || "Home",
            logo: data.logo || "https://via.placeholder.com/200",
            updates: data.updates || "- Ready",
            slogan: data.slogan || "Play. Learn. Repeat"
        });
    } catch(err){
        console.error("Failed to load site settings:", err);
        apply({
            title: "Home",
            logo: "https://via.placeholder.com/200",
            updates: "- System loading...",
            slogan: "Play. Learn. Repeat"
        });
    }
}

function apply(d){
    let el;

    el = document.getElementById("siteName");
    if(el) el.innerText = d.title;

    el = document.getElementById("siteTitle");
    if(el) el.innerText = d.title;

    el = document.getElementById("logoImg");
    if(el) el.src = d.logo;

    el = document.getElementById("updatesText");
    if(el) el.innerHTML = d.updates;

    el = document.getElementById("sloganText");
    if(el) el.innerText = d.slogan;
}

/* =========================
   ADMIN SAVE
========================= */
async function save(){
    if(!isAdminUser){
        alert("Admin only");
        return;
    }

    let title = document.getElementById("titleInput").value;
    let slogan = document.getElementById("sloganInput").value;
    let updates = document.getElementById("updatesInput").value;
    let logoUrl = document.getElementById("logoInput").value;

    try {
        await FireDB.saveSiteSettings({
            title: title || document.getElementById("siteName").innerText,
            logo: logoUrl || document.getElementById("logoImg").src,
            updates: updates || document.getElementById("updatesText").innerHTML,
            slogan: slogan || document.getElementById("sloganText").innerText
        });

        alert("Saved");
        loadSite();
    } catch(err){
        alert("Save error: " + err.message);
    }
}

/* =========================
   GAMES
========================= */
async function loadTopGames(){
    try {
        const games = await FireDB.getGames(true); // published only
        const top = games
            .filter(g => g && g.name)
            .sort((a,b) => ((b.plays_week ?? b.players) || 0) - ((a.plays_week ?? a.players) || 0))
            .slice(0, 4);

        const wrap = document.getElementById("gamesContainer");
        if(!wrap) return;

        if(top.length === 0){
            wrap.innerHTML = "<div>No games available yet</div>";
            return;
        }

        wrap.innerHTML = top.map((g,i) => `
            <div class="game">
                <strong>#${i+1} ${g.name}</strong>
                <p>▶ ${(g.plays_week ?? g.players) || 0} plays (this week)</p>
                <button onclick="openGameById('${g.id}')"
                style="padding:8px 16px;border:none;border-radius:8px;background:var(--accent);color:white;cursor:pointer;margin-top:8px;">
                ${currentUser ? "Play" : "Login Required"}
                </button>
            </div>
        `).join("");
    } catch(err){
        console.error("Failed to load games:", err);
    }
}

function canPlayGames(){
    return !!currentUser;
}

function openGameById(gameId){
    if(!canPlayGames()){
        alert("Login required");
        window.location.href = "login.html";
        return;
    }
    window.location.href = "Games.html?playId=" + encodeURIComponent(gameId);
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", async ()=>{
    loadUserUI();
    loadTokens();

    await resolveAdmin();
    if(isAdminUser){
        document.getElementById("adminPanel").style.display = "block";
    }

    await loadSite();
    await loadTopGames();

    // Sync on storage changes
    window.addEventListener("storage", (e) => {
        if(e.key === "userSync") location.reload();
        if(e.key === "tokenSync") loadTokens();
        if(e.key === "theme") applyTheme();
    });
});

</script>

</body>
</html>
