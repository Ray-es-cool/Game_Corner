<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<script>
function applyTheme(){

let theme = localStorage.getItem("theme") || "dark";
let root = document.documentElement;

/* DARK */
if(theme === "dark"){
root.style.setProperty("--bg", "#000");
root.style.setProperty("--panel", "#0a0a0a");
root.style.setProperty("--card", "#1f2937");
root.style.setProperty("--accent", "#3b82f6");
root.style.setProperty("--text", "white");
}

/* LIGHT */
if(theme === "light"){
root.style.setProperty("--bg", "#f3f4f6");
root.style.setProperty("--panel", "#ffffff");
root.style.setProperty("--card", "#e5e7eb");
root.style.setProperty("--accent", "#2563eb");
root.style.setProperty("--text", "#111");
}

/* PINK */
if(theme === "pink"){
root.style.setProperty("--bg", "#1a001f");
root.style.setProperty("--panel", "#2a0a2f");
root.style.setProperty("--card", "#3b0f42");
root.style.setProperty("--accent", "#ff4fa3");
root.style.setProperty("--text", "white");
}

}

applyTheme();

window.addEventListener("storage",(e)=>{
if(e.key === "theme") applyTheme();
});
</script>

<style>
body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:1200px;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
margin-top:20px;
border-radius:20px;
background:var(--panel);
box-shadow:0 0 15px rgba(59,130,246,0.4);
}

.nav-left{
width:120px;
}

.nav-center{
display:flex;
gap:20px;
justify-content:center;
flex:1;
}

.nav-right{
width:120px;
display:flex;
justify-content:flex-end;
}

.nav a{
color:var(--text);
text-decoration:none;
padding:10px 14px;
border-radius:10px;
}

.nav a:hover{
background:var(--card);
}

/* USER */
.user-box{
display:flex;
align-items:center;
gap:10px;
}

.user-box img{
width:40px;
height:40px;
border-radius:50%;
}

/* MAIN */
.main{
text-align:center;
margin-top:80px;
}

.box{
display:inline-block;
padding:30px;
background:var(--panel);
border-radius:20px;
box-shadow:0 0 20px rgba(59,130,246,0.3);
width:320px;
}

/* INPUTS */
input{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:var(--card);
color:var(--text);
}

/* BUTTON */
button{
width:100%;
margin-top:15px;
padding:14px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
cursor:pointer;
}

.switch{
margin-top:15px;
cursor:pointer;
color:var(--accent);
}

.logout-btn{
background:#ef4444;
margin-top:15px;
}

.token{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:36px;
}
</style>
</head>

<body>

<div class="container">

<!-- NAV -->
<div class="nav">

<div class="nav-left"></div>

<div class="nav-center">
<a href="index.html">Home</a>
<a href="Games.html">Games</a>
<a href="DailyRewards.html">Daily Rewards</a>
<a href="shop.html">Shop</a>
<a href="settings.html">Settings</a>
<a href="login.html">Login</a>
</div>

<div class="nav-right">
<div class="user-box" id="userBox"></div>
</div>

</div>

<!-- LOGIN BOX -->
<div class="main">
<div class="box">

<h2 id="title">Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="submit()">Login</button>

<div class="switch" onclick="toggleMode()" id="switchText">
Don't have an account? Register
</div>

<!-- ✅ LOGOUT BUTTON -->
<button id="logoutBtn" class="logout-btn" style="display:none;" onclick="logout()">Logout</button>

<p id="msg"></p>

</div>
</div>

</div>

<div class="token" id="tokens">🪙 0</div>

<!-- 🎧 MUSIC ENGINE -->
<script src="music-engine.js"></script>
<script src="user-helper.js"></script>

<script>

/* =========================
   STATE
========================= */

let isLogin = true;

/* =========================
   SWITCH MODE
========================= */

function toggleMode(){

isLogin = !isLogin;

document.getElementById("title").innerText =
isLogin ? "Login" : "Register";

document.querySelector("button").innerText =
isLogin ? "Login" : "Register";

document.getElementById("switchText").innerText =
isLogin
? "Don't have an account? Register"
: "Already have an account? Login";

}

/* =========================
   SUBMIT
========================= */

async function submit(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

let msg = document.getElementById("msg");

if(!user || !pass){
msg.innerText = "Fill all fields";
return;
}

/* LOGIN */
if(isLogin){

try {
const response = await fetch("http://localhost:3000/api/users/login", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
username: user,
password: pass
})
});

if(!response.ok){
msg.innerText = "Server error: " + response.status;
return;
}

const result = await response.json();

if(result.success){
localStorage.setItem("currentUser", user);
localStorage.setItem(user + "_tokens", result.tokens || 0);
location.reload();
} else {
msg.innerText = result.error || "Invalid login";
}
} catch(err){
msg.innerText = "Connection error. Make sure server is running on port 3000.";
console.error("Login error:", err);
}

}

/* REGISTER */
else{

try {
const response = await fetch("http://localhost:3000/api/users/signup", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
username: user,
password: pass,
pfp: "https://via.placeholder.com/40"
})
});

if(!response.ok){
msg.innerText = "Server error: " + response.status;
return;
}

const result = await response.json();

if(result.success){
msg.innerText = "Account created! Now login.";
toggleMode();
} else {
msg.innerText = result.error || "Registration failed";
}
} catch(err){
msg.innerText = "Connection error. Make sure server is running on port 3000.";
console.error("Signup error:", err);
}

}

}

/* =========================
   INIT
========================= */

// User display is now handled by user-helper.js


</script>

</body>
</html>
