<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<script>

let isLogin = true;

/* =========================
   THEME SYSTEM (SAFE)
========================= */
function applyTheme(){

    let theme = localStorage.getItem("theme") || "dark";
    let root = document.documentElement;

    if(theme === "dark"){
        root.style.setProperty("--bg", "#000");
        root.style.setProperty("--panel", "#0a0a0a");
        root.style.setProperty("--card", "#1f2937");
        root.style.setProperty("--accent", "#3b82f6");
        root.style.setProperty("--text", "white");
    }

    if(theme === "light"){
        root.style.setProperty("--bg", "#f3f4f6");
        root.style.setProperty("--panel", "#ffffff");
        root.style.setProperty("--card", "#e5e7eb");
        root.style.setProperty("--accent", "#2563eb");
        root.style.setProperty("--text", "#111");
    }

    if(theme === "pink"){
        root.style.setProperty("--bg", "#1a001f");
        root.style.setProperty("--panel", "#2a0a2f");
        root.style.setProperty("--card", "#3b0f42");
        root.style.setProperty("--accent", "#ff4fa3");
        root.style.setProperty("--text", "white");
    }
}

applyTheme();

window.addEventListener("storage", (e)=>{
    if(e.key === "theme") applyTheme();
});

/* =========================
   MODE SWITCH
========================= */
function toggleMode(){

    isLogin = !isLogin;

    let title = document.getElementById("title");
    let btn = document.querySelector("button");
    let switchText = document.getElementById("switchText");

    if(title) title.innerText = isLogin ? "Login" : "Register";
    if(btn) btn.innerText = isLogin ? "Login" : "Register";

    if(switchText){
        switchText.innerText = isLogin
            ? "Don't have an account? Register"
            : "Already have an account? Login";
    }
}

/* =========================
   LOGIN / REGISTER
========================= */
async function submit(){

    let user = document.getElementById("username")?.value;
    let pass = document.getElementById("password")?.value;
    let msg = document.getElementById("msg");

    if(!msg) return;

    if(!user || !pass){
        msg.innerText = "Fill all fields";
        return;
    }

    /* =========================
       LOGIN
    ========================= */
    if(isLogin){

        try {

            const res = await fetch("/api/users/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: user, password: pass })
            });

            let result;

            try {
                result = await res.json();
            } catch {
                msg.innerText = "Server response error";
                return;
            }

            if(res.ok && result.success){

                localStorage.setItem("currentUser", user);
                localStorage.setItem(user + "_tokens", result.tokens || 0);

                /* 🔥 GLOBAL SYNC */
                localStorage.setItem("userSync", Date.now());

                /* FIX: prevents blank reload issue */
                window.location.href = "index.html";

            } else {
                msg.innerText = result?.error || "Invalid login";
            }

        } catch(err){
            console.error(err);
            msg.innerText = "Cannot connect to server";
        }

    }

    /* =========================
       REGISTER
    ========================= */
    else{

        try {

            const res = await fetch("/api/users/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: user,
                    password: pass,
                    pfp: "https://via.placeholder.com/40"
                })
            });

            let result = await res.json();

            if(res.ok && result.success){
                msg.innerText = "Account created! You can log in now.";
                toggleMode();
            } else {
                msg.innerText = result?.error || "Registration failed";
            }

        } catch(err){
            console.error(err);
            msg.innerText = "Cannot connect to server";
        }

    }
}

/* =========================
   LOGOUT
========================= */
function logout(){

    localStorage.removeItem("currentUser");

    /* 🔥 SYNC ALL PAGES */
    localStorage.setItem("userSync", Date.now());

    location.reload();
}

/* =========================
   INIT (THIS PREVENTS BLANK PAGE BUG)
========================= */
document.addEventListener("DOMContentLoaded", ()=>{

    let logoutBtn = document.getElementById("logoutBtn");

    if(localStorage.getItem("currentUser") && logoutBtn){
        logoutBtn.style.display = "block";
    }

});

/* =========================
   CROSS PAGE SYNC
========================= */
window.addEventListener("storage", (e)=>{
    if(e.key === "userSync"){
        location.reload();
    }
});

</script>

</body>
</html>
