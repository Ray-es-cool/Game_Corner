<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase-env.js"></script>
<script src="firebase-config.js"></script>

<!-- Shared Styles & Animations -->
<link rel="stylesheet" href="styles.css">
<script src="animations.js"></script>

<script>

let isLogin = true;

/* =========================
   THEME SYSTEM
========================= */
function applyTheme(){
    let theme = localStorage.getItem("theme") || "dark";
    let root = document.documentElement;

    if(theme === "dark"){
        root.style.setProperty("--bg", "#000");
        root.style.setProperty("--panel", "#0a0a0a");
        root.style.setProperty("--card", "#1f2937");
        root.style.setProperty("--accent", "#3b82f6");
        root.style.setProperty("--text", "white");
    }

    if(theme === "light"){
        root.style.setProperty("--bg", "#f3f4f6");
        root.style.setProperty("--panel", "#ffffff");
        root.style.setProperty("--card", "#e5e7eb");
        root.style.setProperty("--accent", "#2563eb");
        root.style.setProperty("--text", "#111");
    }

    if(theme === "pink"){
        root.style.setProperty("--bg", "#1a001f");
        root.style.setProperty("--panel", "#2a0a2f");
        root.style.setProperty("--card", "#3b0f42");
        root.style.setProperty("--accent", "#ff4fa3");
        root.style.setProperty("--text", "white");
    }
}
applyTheme();

window.addEventListener("storage", (e)=>{
    if(e.key === "theme") applyTheme();
});

/* =========================
   MODE SWITCH
========================= */
function toggleMode(){
    isLogin = !isLogin;

    let title = document.getElementById("title");
    let btn = document.querySelector("button[type='button']");
    let switchText = document.getElementById("switchText");

    if(title) title.innerText = isLogin ? "Login" : "Register";
    if(btn) btn.innerText = isLogin ? "Login" : "Register";

    if(switchText){
        switchText.innerText = isLogin
            ? "Don't have an account? Register"
            : "Already have an account? Login";
    }
}

/* =========================
   LOGIN / REGISTER
========================= */
async function submit(){
    let user = document.getElementById("username")?.value;
    let pass = document.getElementById("password")?.value;
    let msg = document.getElementById("msg");

    if(!msg) return;

    if(!user || !pass){
        msg.innerText = "Fill all fields";
        return;
    }

    /* =========================
       LOGIN
    ========================= */
    if(isLogin){
        try {
            const result = await FireDB.login(user, pass);

            if(result){
                localStorage.setItem("currentUser", user);
                localStorage.setItem("currentUid", result.uid);
                localStorage.setItem(user + "_tokens", result.tokens || 0);

                // Sync across all pages
                localStorage.setItem("userSync", Date.now());

                window.location.href = "index.html";
            } else {
                msg.innerText = "Invalid login";
            }
        } catch(err){
            console.error(err);
            msg.innerText = "Cannot connect to server - make sure Firebase is configured";
        }
    }

    /* =========================
       REGISTER
    ========================= */
    else {
        try {
            const result = await FireDB.createUser(user, pass, "https://via.placeholder.com/40");

            if(result){
                msg.innerText = "Account created! You can log in now.";
                toggleMode();
            } else {
                msg.innerText = "Registration failed";
            }
        } catch(err){
            console.error(err);
            if(err.code === 'auth/email-already-in-use'){
                msg.innerText = "Username already taken";
            } else if(err.code === 'auth/weak-password'){
                msg.innerText = "Password must be at least 6 characters";
            } else {
                msg.innerText = "Cannot connect to server - make sure Firebase is configured";
            }
        }
    }
}

/* =========================
   LOGOUT
========================= */
function logout(){
    FireDB.logout();
    localStorage.removeItem("currentUser");
    localStorage.removeItem("currentUid");
    localStorage.setItem("userSync", Date.now());
    location.reload();
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", ()=>{
    let logoutBtn = document.getElementById("logoutBtn");

    if(localStorage.getItem("currentUser") && logoutBtn){
        logoutBtn.style.display = "block";
    }
});

/* =========================
   CROSS PAGE SYNC
========================= */
window.addEventListener("storage", (e)=>{
    if(e.key === "userSync"){
        location.reload();
    }
});

</script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    width:100%;
    max-width:400px;
    padding:30px;
    background:var(--panel);
    border-radius:20px;
    box-shadow:0 0 30px rgba(59,130,246,0.3);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:var(--card);
    color:var(--text);
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}


.switch{
    text-align:center;
    margin-top:15px;
    opacity:0.7;
    cursor:pointer;
}

.switch:hover{
    opacity:1;
}

#msg{
    text-align:center;
    margin-top:15px;
    color:#ef4444;
}

.nav-link{
    text-align:center;
    margin-top:20px;
}

.nav-link a{
    color:var(--accent);
    text-decoration:none;
}

.nav-link a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title">Login</h1>

    <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
    </div>

    <button type="button" onclick="submit()">Login</button>

    <div class="switch" id="switchText" onclick="toggleMode()">
        Don't have an account? Register
    </div>

    <div id="msg"></div>

    <div class="nav-link">
        <a href="index.html">← Back to Home</a>
    </div>
</div>

</body>
</html>
