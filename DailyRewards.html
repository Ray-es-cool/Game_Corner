<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Rewards</title>

<script>

/* =========================
   DAILY REWARDS - FULL SYSTEM CONNECTED
   (uses GLOBAL user-system.js state)
========================= */

/* SAFETY: get global user */
function getCurrentUser(){
    return localStorage.getItem("currentUser") || null;
}

/* ELEMENTS */
let btn = document.getElementById("btn");
let msg = document.getElementById("msg");
let tokenEl = document.getElementById("tokens");
let userBox = document.getElementById("userBox");

/* =========================
   CONSTANTS
========================= */
const COOLDOWN = 24 * 60 * 60 * 1000; // 24h

/* =========================
   USER DISPLAY (FULL SAFE RENDER)
========================= */
function renderUser(){

    let user = getCurrentUser();

    if(!user){
        if(userBox){
            userBox.innerHTML = `<a href="login.html">Login</a>`;
        }

        if(btn){
            btn.disabled = true;
        }

        if(msg){
            msg.innerText = "Login required to claim rewards";
        }

        return;
    }

    if(userBox){
        userBox.innerHTML = `
            <div style="display:flex;align-items:center;gap:10px;">
                <span>${user}</span>
                <button onclick="logoutUser()" 
                    style="padding:6px 12px;background:#ef4444;color:white;border:none;border-radius:6px;cursor:pointer;">
                    Logout
                </button>
            </div>
        `;
    }

    if(btn){
        btn.disabled = false;
    }
}

/* =========================
   TOKENS SYSTEM (GLOBAL SYNC FORMAT)
========================= */
function loadTokens(){

    let user = getCurrentUser();
    if(!user || !tokenEl) return;

    let tokens = parseInt(localStorage.getItem(user + "_tokens")) || 0;
    tokenEl.innerText = "🪙 " + tokens;
}

/* =========================
   CLAIM REWARD
========================= */
function claim(){

    let user = getCurrentUser();
    if(!user) return;

    let last = localStorage.getItem(user + "_lastClaim");

    if(last && (Date.now() - parseInt(last)) < COOLDOWN){
        updateCooldown();
        return;
    }

    let key = user + "_tokens";
    let current = parseInt(localStorage.getItem(key)) || 0;

    current += 5;

    localStorage.setItem(key, current);
    localStorage.setItem(user + "_lastClaim", Date.now());

    msg.innerText = "Reward claimed: +5 🪙";

    loadTokens();
    updateCooldown();

    /* GLOBAL SYNC EVENT */
    localStorage.setItem("tokenSync", Date.now());
}

/* =========================
   COOLDOWN SYSTEM (FULL UI CONTROL)
========================= */
function updateCooldown(){

    let user = getCurrentUser();
    if(!user) return;

    let last = localStorage.getItem(user + "_lastClaim");

    if(!last){
        btn.disabled = false;
        msg.innerText = "Claim your daily reward!";
        return;
    }

    let elapsed = Date.now() - parseInt(last);
    let remaining = COOLDOWN - elapsed;

    if(remaining > 0){

        btn.disabled = true;

        let hours = Math.floor(remaining / 3600000);
        let minutes = Math.floor((remaining % 3600000) / 60000);
        let seconds = Math.floor((remaining % 60000) / 1000);

        msg.innerText = `Next reward in ${hours}h ${minutes}m ${seconds}s`;

    } else {
        btn.disabled = false;
        msg.innerText = "Reward ready!";
    }
}

/* =========================
   CLICK HANDLER
========================= */
btn.onclick = claim;

/* =========================
   STORAGE SYNC (CRITICAL FOR MULTI PAGE)
========================= */
window.addEventListener("storage", (e) => {

    if(e.key === "currentUser"){
        renderUser();
        loadTokens();
        updateCooldown();
    }

    if(e.key && e.key.includes("_tokens")){
        loadTokens();
    }

    if(e.key && e.key.includes("_lastClaim")){
        updateCooldown();
    }
});

/* =========================
   GLOBAL LOGOUT SUPPORT
========================= */
function logoutUser(){
    localStorage.removeItem("currentUser");
    location.reload();
}

/* =========================
   INIT (FULL SAFE BOOT)
========================= */
function initDailyRewards(){

    renderUser();
    loadTokens();
    updateCooldown();

    setInterval(updateCooldown, 1000); // live countdown feel
}

/* BOOT AFTER LOAD */
document.addEventListener("DOMContentLoaded", initDailyRewards);

</script>
</body>
</html>
