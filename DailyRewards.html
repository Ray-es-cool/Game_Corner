<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Rewards</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="firebase-env.js"></script>
<script src="firebase-config.js"></script>

<!-- Shared Styles & Animations -->
<link rel="stylesheet" href="styles.css">
<script src="animations.js"></script>

<script>
function applyTheme(){
    let theme = localStorage.getItem("theme") || "dark";
    let root = document.documentElement;

    if(theme === "dark"){
        root.style.setProperty("--bg", "#000");
        root.style.setProperty("--panel", "#0a0a0a");
        root.style.setProperty("--card", "#1f2937");
        root.style.setProperty("--accent", "#3b82f6");
        root.style.setProperty("--text", "white");
    }

    if(theme === "light"){
        root.style.setProperty("--bg", "#f3f4f6");
        root.style.setProperty("--panel", "#ffffff");
        root.style.setProperty("--card", "#e5e7eb");
        root.style.setProperty("--accent", "#2563eb");
        root.style.setProperty("--text", "#111");
    }

    if(theme === "pink"){
        root.style.setProperty("--bg", "#1a001f");
        root.style.setProperty("--panel", "#2a0a2f");
        root.style.setProperty("--card", "#3b0f42");
        root.style.setProperty("--accent", "#ff4fa3");
        root.style.setProperty("--text", "white");
    }
}
applyTheme();

window.addEventListener("storage",(e)=>{
    if(e.key === "theme") applyTheme();
});
</script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

.nav{
    width:80%;
    margin:20px auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    border-radius:30px;
    background:var(--panel);
    box-shadow:0 0 20px rgba(59,130,246,0.4);
}

.nav-center{
    display:flex;
    gap:30px;
    margin:auto;
}

.nav a{
    color:var(--text);
    text-decoration:none;
    padding:8px 14px;
    border-radius:10px;
}

.nav a:hover{
    background:var(--card);
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.main{
    width:80%;
    margin:60px auto;
    text-align:center;
}

.reward-box{
    background:var(--panel);
    display:inline-block;
    padding:40px;
    border-radius:25px;
    box-shadow:0 0 30px rgba(59,130,246,0.4);
    min-width:300px;
}

.reward-box h1{
    font-size:32px;
    margin-bottom:10px;
}

.reward-box p{
    opacity:0.7;
    margin-bottom:25px;
}

#btn{
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:15px;
    background:var(--accent);
    color:white;
    cursor:pointer;
    font-weight:bold;
}

#btn:disabled{
    background:#4b5563;
    cursor:not-allowed;
}

/* Reward box bounce animation */
.reward-box {
    animation: scaleIn 0.4s ease-out;
}

.reward-icon {
    animation: bounce 2s ease-in-out infinite;
}

#msg{
    margin-top:20px;
    font-size:16px;
    color:var(--accent);
}

.token{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:32px;
}

.reward-icon{
    font-size:64px;
    margin:20px 0;
}
</style>
</head>

<body>

<div class="nav">
    <div></div>
    <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="Games.html">Games</a>
        <a href="DailyRewards.html">Daily Rewards</a>
        <a href="shop.html">Shop</a>
        <a href="settings.html">Settings</a>
    </div>
    <div class="user-box" id="userBox"></div>
</div>

<div class="main">
    <div class="reward-box">
        <h1>Daily Rewards</h1>
        <p>Claim your free tokens every 24 hours!</p>

        <div class="reward-icon">🎁</div>

        <button id="btn">Claim +5 🪙</button>
        <p id="msg"></p>
    </div>
</div>

<div class="token" id="tokens">🪙 0</div>

<script>

/* =========================
   USER STATE
========================= */
let currentUser = localStorage.getItem("currentUser");
let currentUid = localStorage.getItem("currentUid");
const COOLDOWN = 24 * 60 * 60 * 1000; // 24 hours

/* =========================
   UI FUNCTIONS
========================= */
function loadUserUI(){
    let box = document.getElementById("userBox");
    if(!box) return;

    if(currentUser){
        box.innerHTML = `
            <span>${currentUser}</span>
            <button onclick="logoutUser()"
            style="padding:6px 10px;background:#ef4444;border:none;border-radius:6px;color:white;cursor:pointer;">
            Logout
            </button>
        `;
    } else {
        box.innerHTML = `<a href="login.html">Login</a>`;
    }
}

function logoutUser(){
    if(window.FireDB) FireDB.logout();
    localStorage.removeItem("currentUser");
    localStorage.removeItem("currentUid");
    currentUser = null;
    localStorage.setItem("userSync", Date.now());
    location.reload();
}

function loadTokens(){
    let el = document.getElementById("tokens");
    if(!el || !currentUser) return;
    el.innerText = "🪙 " + (localStorage.getItem(currentUser+"_tokens") || 0);
}

/* =========================
   REWARD SYSTEM
========================= */
async function claim(){
    if(!currentUser){
        alert("Please login to claim rewards");
        window.location.href = "login.html";
        return;
    }

    let last = localStorage.getItem(currentUser + "_lastClaim");

    if(last && (Date.now() - parseInt(last)) < COOLDOWN){
        updateCooldown();
        return;
    }

    // Update local tokens
    let key = currentUser + "_tokens";
    let current = parseInt(localStorage.getItem(key)) || 0;
    current += 5;
    localStorage.setItem(key, current);
    localStorage.setItem(currentUser + "_lastClaim", Date.now());

    // Sync to Firebase
    if(currentUid){
        await FireDB.updateTokens(currentUid, current);
    }

    document.getElementById("msg").innerText = "Reward claimed: +5 🪙";
    loadTokens();
    updateCooldown();

    // Global sync
    localStorage.setItem("tokenSync", Date.now());
}

function updateCooldown(){
    if(!currentUser){
        const btn = document.getElementById("btn");
        const msg = document.getElementById("msg");
        if(btn) btn.disabled = true;
        if(msg) msg.innerText = "Login required";
        return;
    }

    let last = localStorage.getItem(currentUser + "_lastClaim");
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    if(!last){
        if(btn) btn.disabled = false;
        if(msg) msg.innerText = "Claim your daily reward!";
        return;
    }

    let elapsed = Date.now() - parseInt(last);
    let remaining = COOLDOWN - elapsed;

    if(remaining > 0){
        if(btn) btn.disabled = true;

        let hours = Math.floor(remaining / 3600000);
        let minutes = Math.floor((remaining % 3600000) / 60000);
        let seconds = Math.floor((remaining % 60000) / 1000);

        if(msg) msg.innerText = `Next reward in ${hours}h ${minutes}m ${seconds}s`;
    } else {
        if(btn) btn.disabled = false;
        if(msg) msg.innerText = "Reward ready!";
    }
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", ()=>{
    loadUserUI();
    loadTokens();
    updateCooldown();

    // Live countdown
    setInterval(updateCooldown, 1000);

    // Button handler
    const btn = document.getElementById("btn");
    if(btn) btn.onclick = claim;

    // Sync listener
    window.addEventListener("storage", (e)=>{
        if(e.key === "currentUser"){
            currentUser = localStorage.getItem("currentUser");
            currentUid = localStorage.getItem("currentUid");
            loadUserUI();
            loadTokens();
            updateCooldown();
        }
        if(e.key === "tokenSync"){
            loadTokens();
        }
        if(e.key === "theme"){
            applyTheme();
        }
        if(e.key && e.key.includes("_lastClaim")){
            updateCooldown();
        }
    });
});

</script>

</body>
</html>
