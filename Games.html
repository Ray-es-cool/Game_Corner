<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Games</title>

<script>

/* =========================
   GLOBAL USER STATE
========================= */
let currentUser = localStorage.getItem("currentUser");

/* =========================
   VARIABLES
========================= */
let selectedIndex = 0;

/* =========================
   STORAGE
========================= */
let games = JSON.parse(localStorage.getItem("games")) || new Array(50).fill(null);

function saveGames(){
    localStorage.setItem("games", JSON.stringify(games));
}

function canPlayGames(){
    return !!currentUser;
}

/* =========================
   SAFE ELEMENT GET
========================= */
function el(id){
    return document.getElementById(id);
}

/* =========================
   RENDER SYSTEM
========================= */
function render(){

    let grid = el("grid");
    if(!grid) return;

    grid.innerHTML = "";

    for(let i = 0; i < games.length; i++){

        let g = games[i];

        if(!g && currentUser !== "Game_Master") continue;

        let div = document.createElement("div");
        div.className = "card";

        if(g){
            let locked = !canPlayGames();

            div.innerHTML = `
                <img src="${g.thumb}">
                <h3>${g.name}</h3>
                <p>👥 ${g.players||0}</p>
                <button onclick="play(${i})" ${locked ? "disabled style='opacity:0.6'" : ""}>
                    ${locked ? "Login Required" : "Play"}
                </button>
            `;
        } else {
            div.innerHTML = `<h3>Empty Slot</h3>`;
        }

        /* ADMIN PANEL */
        if(currentUser === "Game_Master"){
            let admin = document.createElement("div");
            admin.innerHTML = `
                <input placeholder="Game Name" id="name${i}">
                <label class="label">Thumbnail Image</label>
                <input type="file" id="thumb${i}">
                <label class="label">Game Folder</label>
                <input type="file" id="files${i}" webkitdirectory multiple>
                <button onclick="saveSlot(${i})">Save Slot</button>
                <button class="delete" onclick="deleteSlot(${i})">Delete Game</button>
            `;
            div.appendChild(admin);
        }

        grid.appendChild(div);
    }
}

/* =========================
   SAVE SLOT
========================= */
function saveSlot(i){

    let name = el("name"+i)?.value;
    let thumbFile = el("thumb"+i)?.files[0];
    let files = el("files"+i)?.files;

    if(!thumbFile || !files || files.length === 0){
        alert("Upload thumbnail + folder");
        return;
    }

    let thumbReader = new FileReader();

    thumbReader.onload = function(e){

        let gameFiles = {};
        let loaded = 0;
        let total = files.length;

        for(let f of files){

            let reader = new FileReader();

            reader.onload = function(ev){
                gameFiles[f.webkitRelativePath] = ev.target.result;
                loaded++;
                if(loaded === total) finish();
            };

            reader.onerror = function(){
                loaded++;
                if(loaded === total) finish();
            };

            reader.readAsDataURL(f);
        }

        function finish(){
            games[i] = {
                name: name || "Untitled Game",
                players: 0,
                thumb: e.target.result,
                files: gameFiles
            };

            saveGames();
            render();
        }
    };

    thumbReader.readAsDataURL(thumbFile);
}

/* =========================
   DELETE
========================= */
function deleteSlot(i){
    games[i] = null;
    saveGames();
    render();
}

/* =========================
   PLAY GAME
========================= */
function play(i){

    let g = games[i];
    if(!g) return;

    if(!canPlayGames()){
        alert("Login required");
        window.location.href = "login.html";
        return;
    }

    g.players = (g.players || 0) + 1;
    saveGames();
    render();

    let mainKey = Object.keys(g.files || {}).find(p =>
        p && p.toLowerCase().endsWith("index.html")
    );

    let main = g.files?.[mainKey];

    if(!main){
        alert("index.html not found");
        return;
    }

    let frame = el("gameFrame");
    let overlay = el("gameOverlay");

    if(frame && overlay){
        frame.src = main;
        overlay.style.display = "block";
    }
}

/* =========================
   AUTO PLAY
========================= */
function autoPlayFromQuery(){

    let params = new URLSearchParams(window.location.search);
    let index = params.get("play");

    if(index !== null){
        let i = parseInt(index);
        if(games[i]) play(i);
    }
}

/* =========================
   RETURN BUTTON SAFE BIND
========================= */
document.addEventListener("DOMContentLoaded", ()=>{

    let returnBtn = el("returnBtn");

    if(returnBtn){
        returnBtn.onclick = function(){
            let overlay = el("gameOverlay");
            let frame = el("gameFrame");

            if(overlay) overlay.style.display = "none";
            if(frame) frame.src = "";
        };
    }

    render();
    autoPlayFromQuery();
    syncUserUI();
    initGlobalMusic();
});

/* =========================
   MUSIC SYSTEM (SAFE)
========================= */
function initGlobalMusic(){

    if(window.globalAudio) return;

    let audio = new Audio();
    audio.loop = true;

    let playlist = JSON.parse(localStorage.getItem("playlist")) || [];
    let track = parseInt(localStorage.getItem("track")) || 0;

    if(playlist.length && playlist[track]){
        audio.src = playlist[track].data || playlist[track];
        audio.currentTime = parseFloat(localStorage.getItem("musicTime")) || 0;
    }

    if(localStorage.getItem("musicPlaying") === "true"){
        audio.play().catch(()=>{});
    }

    document.addEventListener("click", ()=>{
        audio.play().catch(()=>{});
    }, {once:true});

    window.globalAudio = audio;

    setInterval(()=>{
        if(audio.src && !isNaN(audio.currentTime)){
            localStorage.setItem("musicTime", audio.currentTime);
        }
    }, 500);
}

/* =========================
   TOKEN SYSTEM (SAFE)
========================= */
function updateTokens(){

    let tokenEl = el("tokens");

    if(tokenEl && currentUser){
        let t = localStorage.getItem(currentUser+"_tokens") || 0;
        tokenEl.innerText = "🪙 " + t;
    }
}

/* =========================
   USER UI
========================= */
function syncUserUI(){

    let userBox = el("userBox");

    if(userBox && currentUser){
        userBox.innerHTML = `<span>${currentUser}</span>`;
    }

    if(currentUser === "Game_Master"){
        document.querySelectorAll(".admin")
        .forEach(p => p.style.display = "block");
    }

    updateTokens();
}

/* =========================
   LIVE SYNC
========================= */
window.addEventListener("storage", (e)=>{

    if(e.key === "games") render();
    if(e.key === "userSync") location.reload();
});

</script>
</body>
</html>
