<script>
function applyTheme(){
    let theme = localStorage.getItem("theme") || "dark";
    let root = document.documentElement;

    if(theme === "dark"){
        root.style.setProperty("--bg", "#000");
        root.style.setProperty("--panel", "#0a0a0a");
        root.style.setProperty("--card", "#1f2937");
        root.style.setProperty("--accent", "#3b82f6");
        root.style.setProperty("--text", "white");
    }

    if(theme === "light"){
        root.style.setProperty("--bg", "#f3f4f6");
        root.style.setProperty("--panel", "#ffffff");
        root.style.setProperty("--card", "#e5e7eb");
        root.style.setProperty("--accent", "#2563eb");
        root.style.setProperty("--text", "#111");
    }

    if(theme === "pink"){
        root.style.setProperty("--bg", "#1a001f");
        root.style.setProperty("--panel", "#2a0a2f");
        root.style.setProperty("--card", "#3b0f42");
        root.style.setProperty("--accent", "#ff4fa3");
        root.style.setProperty("--text", "white");
    }
}
applyTheme();

window.addEventListener("storage",(e)=>{
    if(e.key === "theme") applyTheme();
});
</script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

/* NAV */
.nav{
    width:80%;
    margin:20px auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    border-radius:30px;
    background:var(--panel);
    box-shadow:0 0 20px rgba(59,130,246,0.4);
}

.nav-center{
    display:flex;
    gap:30px;
    margin:auto;
}

.nav a{
    color:var(--text);
    text-decoration:none;
    padding:8px 14px;
    border-radius:10px;
}

.nav a:hover{
    background:var(--card);
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
}

/* MAIN */
.main{
    width:80%;
    margin:auto;
    padding:20px 0;
}

.title{
    text-align:center;
    font-size:40px;
    margin-bottom:20px;
}

/* GAME GRID */
.game-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));

}

.card{
    background:var(--panel);
    border-radius:15px;
    padding:15px;
    box-shadow:0 0 15px rgba(59,130,246,0.2);
    text-align:center;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
    background:var(--card);
}

.card h3{
    margin:10px 0 5px;
}

.card p{
    opacity:0.7;
    margin-bottom:10px;
}

.card button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    cursor:pointer;
    margin:5px;
}

.card button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

/* Game card hover - enhanced with shared styles */
.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
}

/* ADMIN PANEL */
.admin-panel{
    margin-top:15px;
    padding:15px;
    background:var(--card);
    border-radius:10px;
    text-align:left;
}

.admin-panel input[type="text"],
.admin-panel input[type="file"]{
    width:100%;
    padding:8px;
    margin:5px 0;
    border-radius:5px;
    border:none;
    background:var(--bg);
    color:var(--text);
}

.admin-panel label{
    display:block;
    margin-top:10px;
    font-weight:bold;
    color:var(--accent);
}

.admin-panel button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:var(--accent);
    color:white;
}

.admin-panel .save-btn{
    background:#22c55e;
}

.admin-panel .publish-btn{
    background:var(--accent);
}

.admin-panel .delete-btn{
    background:#ef4444;
}

.admin-panel .publish-btn:disabled{
    background:#4b5563;
    cursor:not-allowed;
}

/* EMPTY SLOT */
.empty-slot{
    background:var(--panel);
    border:2px dashed var(--card);
    border-radius:15px;
    padding:40px 20px;
    text-align:center;
    color:var(--text);
    opacity:0.5;
}

/* GAME OVERLAY */
.game-overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    z-index:1000;
}

.game-container{
    width:90%;
    height:90%;
    margin:2% auto;
    background:#111;
    border-radius:10px;

}

.game-frame{
    width:100%;

}

.game-header{
    height:50px;
    background:var(--panel);

    justify-content:space-between;

.game-header button{

</style>

<!-- GAME OVERLAY -->
<div class="game-overlay" id="gameOverlay">

        </div>

</div>

<div class="token" id="tokens">🪙 0</div>

<script>

/* =========================
   STATE
========================= */
let currentUser = localStorage.getItem("currentUser");
let currentUid = localStorage.getItem("currentUid");
let games = [];
let activeTab = "all";
let isAdminUser = false;
let currentPlaying = { gameId: null, creditPingTimer: null, gotCreditResponse: false };

/* =========================
   USER UI
========================= */
function loadUserUI(){
    let box = document.getElementById("userBox");
    if(!box) return;

    if(currentUser){
        box.innerHTML = `
            <span>${currentUser}</span>
            <button onclick="logoutUser()"
            style="padding:6px 10px;background:#ef4444;border:none;border-radius:6px;color:white;cursor:pointer;">
            Logout
            </button>
        `;
    } else {
        box.innerHTML = `<a href="login.html">Login</a>`;
    }
}

function logoutUser(){
    if(window.FireDB) FireDB.logout();
    localStorage.removeItem("currentUser");
    localStorage.removeItem("currentUid");
    currentUser = null;
    localStorage.setItem("userSync", Date.now());
    location.reload();
}

function loadTokens(){
    let el = document.getElementById("tokens");
    if(!el || !currentUser) return;
    el.innerText = "🪙 " + (localStorage.getItem(currentUser+"_tokens") || 0);
}

async function resolveAdmin(){
    isAdminUser = false;
    if(!currentUser || !currentUid || !window.FireDB) return false;
    try{
        const data = await FireDB.getUserData(currentUid);
        isAdminUser = (data?.username === "Game_Master" && currentUser === "Game_Master");
        return isAdminUser;
    }catch(e){
        isAdminUser = false;
        return false;
    }
}

/* =========================
   LOAD GAMES
========================= */
async function loadGames(){
    try {
        // Weekly reset (lazy)
        if(FireDB.ensureWeeklyReset) {
            await FireDB.ensureWeeklyReset();
        }

        // Admin can see everything, users see published only
        games = await FireDB.getGames(!isAdminUser);
        renderGamesByTab();
    } catch(err){
        console.error("Failed to load games:", err);
        document.getElementById("gameGrid").innerHTML = "<p>Failed to load games</p>";
    }
}

function normalizeGame(g){
    return {
        id: g.id,
        name: g.name || "Untitled",
        thumbnail: g.thumbnail || "https://via.placeholder.com/200?text=No+Image",
        published: g.published === true,
        playsWeek: g.plays_week || 0,
        playsTotal: g.plays_total || 0,
        legacyPlayers: g.players || 0,
        creditEligible: (typeof g.credit_eligible === "boolean") ? g.credit_eligible : null,
        slotIndex: (typeof g.slot_index === "number") ? g.slot_index : null,
        gameFiles: g.game_files
    };
}

function renderGamesByTab(){
    const grid = document.getElementById("gameGrid");
    if(!grid) return;

    grid.innerHTML = "";

    const normalized = (games || []).map(normalizeGame);

    const publishedGames = isAdminUser ? normalized : normalized.filter(g => g.published);
    let list = publishedGames;

    if(activeTab === "credit"){
        list = publishedGames.filter(g => g.creditEligible === true);
    }
    if(activeTab === "noncredit"){
        list = publishedGames.filter(g => g.creditEligible === false);
    }
    if(activeTab === "popular"){
        list = [...publishedGames].sort((a,b) => (b.playsWeek || 0) - (a.playsWeek || 0));
    }
    if(activeTab === "all"){
        list = [...publishedGames].sort((a,b) => (b.playsWeek || 0) - (a.playsWeek || 0));
    }

    if(list.length === 0){
        grid.innerHTML = `<div style="opacity:0.7;text-align:center;padding:40px;">No games in this section yet.</div>`;
        return;
    }

    for(const game of list){
        const canPlay = !!currentUser;
        const creditLabel = game.creditEligible === true ? "🪙 Credit" : (game.creditEligible === false ? "🚫 Non‑credit" : "❓ Auto");
        const playsLabel = `▶ ${game.playsWeek} this week • ${game.playsTotal} total`;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${game.thumbnail}" alt="${game.name}">
            <h3>${game.name}</h3>
            <p style="margin:6px 0;opacity:0.85;">${creditLabel}</p>
            <p style="margin:6px 0;opacity:0.7;">${playsLabel}</p>
            <button onclick="playGameById('${game.id}')" ${canPlay ? "" : "disabled"}>
                ${canPlay ? "Play" : "Login Required"}
            </button>
        `;

        if(isAdminUser){
            card.innerHTML += `
                <div class="admin-panel">
                    <div style="display:flex;gap:10px;">
                        <button class="publish-btn" onclick="togglePublishById('${game.id}', ${game.published ? "true" : "false"})" style="flex:1;">
                            ${game.published ? "Unpublish" : "Publish"}
                        </button>
                        <button class="delete-btn" onclick="deleteGameById('${game.id}')" style="flex:1;">Delete</button>
                    </div>
                </div>
            `;
        }

        grid.appendChild(card);
    }
}

/* =========================
   TAB SWITCHING
========================= */
function showTab(tab){
    activeTab = tab;
    document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
    if(tab === "all") document.getElementById("tabAll")?.classList.add("active");
    if(tab === "credit") document.getElementById("tabCredit")?.classList.add("active");
    if(tab === "popular") document.getElementById("tabPopular")?.classList.add("active");
    if(tab === "noncredit") document.getElementById("tabNonCredit")?.classList.add("active");
    renderGamesByTab();
}

/* =========================
   ADMIN: CREATE GAME
========================= */
function openAddGame(){
    if(!isAdminUser) return;
    document.getElementById("addGameModal").style.display = "block";
}
function closeAddGame(){
    const modal = document.getElementById("addGameModal");
    if(modal) modal.style.display = "none";
}

async function createGameFromModal(){
    if(!isAdminUser){
        alert("Only Game_Master can add games");
        return;
    }

    const title = document.getElementById("newGameTitle")?.value?.trim();
    const thumbFile = document.getElementById("newGameThumb")?.files?.[0];
    const gameFiles = document.getElementById("newGameFiles")?.files;
    const creditMode = document.getElementById("newGameCreditMode")?.value || "auto";
    const publish = !!document.getElementById("newGamePublish")?.checked;

    if(!title){
        alert("Please enter a title");
        return;
    }
    if(!thumbFile){
        alert("Please upload a thumbnail image");
        return;
    }
    if(!gameFiles || gameFiles.length === 0){
        alert("Please upload a game folder (must include index.html)");
        return;
    }

    // Ensure index.html exists
    const indexFile = Array.from(gameFiles).find(f => f.name.toLowerCase() === "index.html");
    if(!indexFile){
        alert("Game folder must contain index.html");
        return;
    }

    const creditEligible =
        creditMode === "credit" ? true :
        creditMode === "noncredit" ? false :
        null;

    const thumbData = await readFileAsDataUrl(thumbFile);
    const fileData = await readFilesAsDataUrlMap(gameFiles);

    try{
        await FireDB.createGame({
            name: title,
            thumbnail: thumbData,
            gameFiles: fileData,
            entryKey: indexFile.webkitRelativePath || indexFile.name,
            publish,
            creditEligible
        });
        if(window.CritAnimations?.showToast) CritAnimations.showToast("Game created");
        closeAddGame();
        await loadGames();
    }catch(err){
        alert("Create error: " + err.message);
    }
}

function readFileAsDataUrl(file){
    return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = (e) => resolve(e.target.result);
        r.onerror = () => reject(new Error("Failed to read file"));
        r.readAsDataURL(file);
    });
}

function readFilesAsDataUrlMap(fileList){
    return new Promise((resolve) => {
        const files = Array.from(fileList || []);
        const map = {};
        let loaded = 0;
        if(files.length === 0) return resolve(map);
        for(const f of files){
            const r = new FileReader();
            r.onload = (e) => {
                map[f.webkitRelativePath || f.name] = e.target.result;
                loaded++;
                if(loaded === files.length) resolve(map);
            };
            r.onerror = () => {
                loaded++;
                if(loaded === files.length) resolve(map);
            };
            r.readAsDataURL(f);
        }
    });
}

async function togglePublishById(gameId, currentlyPublished){
    if(!isAdminUser) return;
    try{
        await FireDB.updateGameById(gameId, { published: !currentlyPublished });
        await loadGames();
    }catch(err){
        alert("Publish error: " + err.message);
    }
}

async function deleteGameById(gameId){
    if(!isAdminUser) return;
    if(!confirm("Delete this game?")) return;
    try{
        await FireDB.deleteGameById(gameId);
        await loadGames();
    }catch(err){
        alert("Delete error: " + err.message);
    }
}

/* =========================
   PLAY GAME
========================= */
async function playGameById(gameId){
    if(!currentUser){
        alert("Login required to play games");
        window.location.href = "login.html";
        return;
    }

    const raw = (games || []).find(g => g.id === gameId);
    if(!raw){
        alert("Game not found");
        return;
    }

    const game = normalizeGame(raw);

    // Increment play count
    if(FireDB.incrementPlayCountById){
        await FireDB.incrementPlayCountById(gameId);
    } else if(game.slotIndex !== null){
        await FireDB.incrementPlayCount(game.slotIndex);
    }

    // Parse game files
    let gameFiles = {};
    try {
        gameFiles = typeof game.gameFiles === 'string' ? JSON.parse(game.gameFiles) : (game.gameFiles || {});
    } catch(e){
        alert("Error loading game files");
        return;
    }

    // Find index.html
    let mainKey = raw.entry_key || Object.keys(gameFiles).find(p => p.toLowerCase().endsWith("index.html"));

    if(!mainKey){
        alert("index.html not found in game files");
        return;
    }

    const main = gameFiles[mainKey];

    // Open game in overlay
    const overlay = document.getElementById("gameOverlay");
    const frame = document.getElementById("gameFrame");
    const title = document.getElementById("gameTitle");

    if(overlay && frame){
        title.innerText = "Playing: " + game.name;
        currentPlaying.gameId = gameId;
        currentPlaying.gotCreditResponse = false;

        // When iframe loads, ping for credit capability.
        frame.onload = () => {
            try{
                frame.contentWindow?.postMessage({ type: "CRITSTRIKE_PING", gameId }, "*");
            }catch(_) {}

            if(currentPlaying.creditPingTimer) clearTimeout(currentPlaying.creditPingTimer);
            currentPlaying.creditPingTimer = setTimeout(async () => {
                // If no response, classify as non-credit (only if not decided yet)
                if(!currentPlaying.gotCreditResponse && game.creditEligible === null){
                    try{
                        await FireDB.setGameCreditEligible(gameId, false);
                        await loadGames();
                    }catch(_) {}
                }
            }, 2500);
        };
        frame.src = main;
        overlay.style.display = "block";
    }
}

// Game ↔ site credit messaging
window.addEventListener("message", async (event) => {
    const frame = document.getElementById("gameFrame");
    if(!frame || event.source !== frame.contentWindow) return;
    const msg = event.data || {};
    if(!msg || typeof msg !== "object") return;

    if(msg.type === "CRITSTRIKE_CREDIT_CAPABLE"){
        currentPlaying.gotCreditResponse = true;
        if(currentPlaying.creditPingTimer) clearTimeout(currentPlaying.creditPingTimer);
        if(currentPlaying.gameId){
            try{
                await FireDB.setGameCreditEligible(currentPlaying.gameId, true);
                await loadGames();
            }catch(_) {}
        }
    }

    if(msg.type === "CRITSTRIKE_CREDIT_AWARD"){
        currentPlaying.gotCreditResponse = true;
        if(currentPlaying.creditPingTimer) clearTimeout(currentPlaying.creditPingTimer);

        const amount = parseInt(msg.amount, 10);
        if(!currentUid || !currentUser || !Number.isFinite(amount) || amount <= 0) return;

        try{
            if(FireDB.incrementTokens) await FireDB.incrementTokens(currentUid, amount);
        }catch(_) {}

        const key = currentUser + "_tokens";
        const current = parseInt(localStorage.getItem(key), 10) || 0;
        localStorage.setItem(key, String(current + amount));
        localStorage.setItem("tokenSync", Date.now());
        loadTokens();

        if(window.CritAnimations?.showToast) CritAnimations.showToast(`+${amount} 🪙`);
        if(window.CritAnimations?.createConfetti) CritAnimations.createConfetti();
    }
});

// Legacy support for index.html deep-links (?play=slot_index)
async function playGame(slotIndex){
    const raw = (games || []).find(g => g.slot_index === slotIndex);
    if(!raw) return alert("Game not found");
    return playGameById(raw.id);
}

function closeGame(){
    const overlay = document.getElementById("gameOverlay");
    const frame = document.getElementById("gameFrame");

    if(overlay) overlay.style.display = "none";
    if(frame) {
        frame.onload = null;
        frame.src = "";
    }
    currentPlaying.gameId = null;
    currentPlaying.gotCreditResponse = false;
    if(currentPlaying.creditPingTimer) clearTimeout(currentPlaying.creditPingTimer);
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", ()=>{
    loadUserUI();
    loadTokens();
    resolveAdmin().then(async () => {
        const addBtn = document.getElementById("addGameBtn");
        if(isAdminUser && addBtn){
            addBtn.style.display = "block";
            addBtn.onclick = openAddGame;
        }
        await loadGames();
        renderGamesByTab();

        const params = new URLSearchParams(window.location.search);
        const playId = params.get("playId");
        if(playId){
            playGameById(playId);
            return;
        }
        const playSlot = params.get("play");
        if(playSlot !== null && playSlot !== ""){
            const idx = parseInt(playSlot, 10);
            if(!Number.isNaN(idx)) {
                playGame(idx);
            }
        }
    });

    // Sync on storage changes
    window.addEventListener("storage", (e)=>{
        if(e.key === "gamesSync"){
            loadGames();
        }
        if(e.key === "userSync"){
            location.reload();
        }
        if(e.key === "theme"){
            applyTheme();
        }
    });
