<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Games</title>

<script>

/* =========================
   GLOBAL USER STATE
========================= */
let currentUser = localStorage.getItem("currentUser");

/* =========================
   INITIAL VARIABLES
========================= */
let selectedIndex = 0;

/* =========================
   STORAGE
========================= */
let games = JSON.parse(localStorage.getItem("games")) || new Array(50).fill(null);

function saveGames(){
    localStorage.setItem("games", JSON.stringify(games));
}

function canPlayGames(){
    return !!currentUser;
}

/* =========================
   RENDER
========================= */
function render(){
    let grid = document.getElementById("grid");
    if(!grid) return;

    grid.innerHTML = "";

    games.forEach((g,i)=>{

        if(!g && currentUser !== "Game_Master") return;

        let div = document.createElement("div");
        div.className = "card";

        if(g){
            let locked = !canPlayGames();

            div.innerHTML = `
                <img src="${g.thumb}">
                <h3>${g.name}</h3>
                <p>👥 ${g.players||0}</p>
                <button onclick="play(${i})" ${locked ? "disabled style='opacity:0.6'" : ""}>
                    ${locked ? "Login Required" : "Play"}
                </button>
            `;
        } else {
            div.innerHTML = `<h3>Empty Slot</h3>`;
        }

        /* ADMIN PANEL */
        if(currentUser === "Game_Master"){
            let admin = document.createElement("div");
            admin.innerHTML = `
                <input placeholder="Game Name" id="name${i}">
                <label class="label">Thumbnail Image</label>
                <input type="file" id="thumb${i}">
                <label class="label">Game Folder</label>
                <input type="file" id="files${i}" webkitdirectory multiple>
                <button onclick="saveSlot(${i})">Save Slot</button>
                <button class="delete" onclick="deleteSlot(${i})">Delete Game</button>
            `;
            div.appendChild(admin);
        }

        grid.appendChild(div);
    });
}

/* =========================
   SAVE SLOT
========================= */
function saveSlot(i){

    let name = document.getElementById("name"+i)?.value;
    let thumbFile = document.getElementById("thumb"+i)?.files[0];
    let files = document.getElementById("files"+i)?.files;

    if(!thumbFile || !files || files.length === 0){
        alert("Upload thumbnail + folder");
        return;
    }

    let thumbReader = new FileReader();

    thumbReader.onload = function(e){

        let gameFiles = {};
        let loaded = 0;
        let total = files.length;

        for(let f of files){

            let reader = new FileReader();

            reader.onload = function(ev){
                gameFiles[f.webkitRelativePath] = ev.target.result;
                loaded++;
                if(loaded === total) finish();
            };

            reader.onerror = function(){
                loaded++;
                if(loaded === total) finish();
            };

            reader.readAsDataURL(f);
        }

        function finish(){
            games[i] = {
                name: name || "Untitled Game",
                players: 0,
                thumb: e.target.result,
                files: gameFiles
            };
            saveGames();
            render();
        }

    };

    thumbReader.readAsDataURL(thumbFile);
}

/* =========================
   DELETE
========================= */
function deleteSlot(i){
    games[i] = null;
    saveGames();
    render();
}

/* =========================
   PLAY
========================= */
function play(i){
    let g = games[i];
    if(!g) return;

    if(!canPlayGames()){
        alert("Login required");
        window.location.href = "login.html";
        return;
    }

    g.players = (g.players || 0) + 1;
    saveGames();
    render();

    let mainKey = Object.keys(g.files).find(p => p.toLowerCase().endsWith("index.html"));
    let main = g.files[mainKey];

    if(!main){
        alert("index.html not found");
        return;
    }

    let frame = document.getElementById("gameFrame");
    let overlay = document.getElementById("gameOverlay");

    if(frame && overlay){
        frame.src = main;
        overlay.style.display = "block";
    }
}

/* =========================
   AUTO PLAY
========================= */
function autoPlayFromQuery(){
    let params = new URLSearchParams(window.location.search);
    let index = params.get("play");

    if(index !== null){
        let i = parseInt(index);
        if(games[i]) play(i);
    }
}

/* =========================
   RETURN BUTTON (SAFE)
========================= */
let returnBtn = document.getElementById("returnBtn");

if(returnBtn){
    returnBtn.onclick = function(){
        let overlay = document.getElementById("gameOverlay");
        let frame = document.getElementById("gameFrame");

        if(overlay) overlay.style.display = "none";
        if(frame) frame.src = "";
    };
}

/* =========================
   INIT
========================= */
render();
autoPlayFromQuery();

/* =========================
   MUSIC SYSTEM (GLOBAL SYNC)
========================= */
let globalAudio;

function initGlobalMusic(){
    if(window.globalAudio) return;

    globalAudio = new Audio();
    globalAudio.loop = true;

    let playlist = JSON.parse(localStorage.getItem("playlist")) || [];
    let track = parseInt(localStorage.getItem("track")) || 0;
    let volume = parseFloat(localStorage.getItem("volume")) || 0.5;

    if(playlist.length){
        let song = playlist[track];
        globalAudio.src = song.data || song;
        globalAudio.currentTime = parseFloat(localStorage.getItem("musicTime")) || 0;
        globalAudio.volume = volume;
    }

    if(localStorage.getItem("musicPlaying") === "true"){
        globalAudio.play().catch(()=>{});
    }

    document.addEventListener("click", ()=>{
        globalAudio.play().catch(()=>{});
    }, {once:true});

    window.globalAudio = globalAudio;

    setInterval(()=>{
        if(globalAudio.src && !isNaN(globalAudio.currentTime)){
            localStorage.setItem("musicTime", globalAudio.currentTime);
        }
    }, 500);
}

initGlobalMusic();

/* =========================
   TOKEN SYSTEM
========================= */
let tokenEl = document.getElementById("tokens");

if(tokenEl && currentUser){
    let t = localStorage.getItem(currentUser+"_tokens") || 0;
    tokenEl.innerText = "🪙 " + t;
}

window.addEventListener("message", function(e){

    if(!e.data || e.data.type !== "clickSpeedGame") return;
    if(!currentUser) return;

    let current = parseInt(localStorage.getItem(currentUser+"_tokens")) || 0;

    if(e.data.action === "earned"){
        let earned = parseInt(e.data.earned) || 0;

        if(earned > 0){
            current += earned;
            localStorage.setItem(currentUser+"_tokens", current);

            if(tokenEl){
                tokenEl.innerText = "🪙 " + current;
            }

            localStorage.setItem("tokenSync", Date.now());
        }
    }
});

/* =========================
   USER DISPLAY
========================= */
let userBox = document.getElementById("userBox");

if(userBox && currentUser){
    userBox.innerHTML = `<span>${currentUser}</span>`;
}

</script>

</body>
</html>
