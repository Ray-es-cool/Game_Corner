<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tones / Colours</title>

<script>
function applyTheme(){

let theme = localStorage.getItem("theme") || "dark";
let root = document.documentElement;

/* DARK */
if(theme === "dark"){
root.style.setProperty("--bg", "#000");
root.style.setProperty("--panel", "#0a0a0a");
root.style.setProperty("--card", "#1f2937");
root.style.setProperty("--accent", "#3b82f6");
root.style.setProperty("--text", "white");
}

/* LIGHT */
if(theme === "light"){
root.style.setProperty("--bg", "#f3f4f6");
root.style.setProperty("--panel", "#ffffff");
root.style.setProperty("--card", "#e5e7eb");
root.style.setProperty("--accent", "#2563eb");
root.style.setProperty("--text", "#111");
}

/* PINK */
if(theme === "pink"){
root.style.setProperty("--bg", "#1a001f");
root.style.setProperty("--panel", "#2a0a2f");
root.style.setProperty("--card", "#3b0f42");
root.style.setProperty("--accent", "#ff4fa3");
root.style.setProperty("--text", "white");
}
}

applyTheme();

window.addEventListener("storage",(e)=>{
if(e.key === "theme") applyTheme();
});
</script>

<style>
body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

/* NAV */
.nav{
width:80%;
margin:20px auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 30px;
border-radius:30px;
background:var(--panel);
box-shadow:0 0 20px rgba(59,130,246,0.4);
}

.nav-center{
display:flex;
gap:30px;
flex:1;
justify-content:center;
}

.nav a{
color:var(--text);
text-decoration:none;
padding:8px 14px;
border-radius:10px;
}

.nav a:hover{
background:var(--card);
}

.user-box{
display:flex;
align-items:center;
gap:10px;
}

/* MAIN */
.container{
width:80%;
margin:auto;
margin-top:60px;
text-align:center;
}

.card{
display:inline-block;
width:250px;
padding:20px;
margin:15px;
border-radius:20px;
background:var(--panel);
box-shadow:0 0 20px rgba(0,0,0,0.3);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.preview{
height:120px;
border-radius:15px;
margin-bottom:10px;
}

.blue{ background:#0a0a0a; border:2px solid #3b82f6; }
.light{ background:#ffffff; border:2px solid #2563eb; }
.pink{ background:#2a0a2f; border:2px solid #ff4fa3; }

.token{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:32px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div></div>

<div class="nav-center">
<a href="index.html">Home</a>
<a href="Games.html">Games</a>
<a href="DailyRewards.html">Daily Rewards</a>
<a href="settings.html">Settings</a>
<a href="login.html">Login</a>
<a href="shop.html">Shop</a>
<a href="tones.html">Tones</a>
</div>

<div class="user-box" id="userBox"></div>
</div>

<!-- MAIN -->
<div class="container">

<h1>Choose Your Theme</h1>

<div class="card" onclick="setTheme('dark')">
<div class="preview blue"></div>
<h3>Dark Blue (Default)</h3>
</div>

<div class="card" onclick="setTheme('light')">
<div class="preview light"></div>
<h3>Light Mode</h3>
</div>

<div class="card" onclick="setTheme('pink')">
<div class="preview pink"></div>
<h3>Pink Mode</h3>
</div>

</div>

<div class="token" id="tokens">🪙 0</div>

<script src="music-engine.js"></script>

<script>

/* =========================
   GLOBAL USER SYSTEM
========================= */
let currentUser = localStorage.getItem("currentUser");

function loadUserUI(){
let box = document.getElementById("userBox");

if(!box) return;

if(currentUser){
box.innerHTML = `
<span>${currentUser}</span>
<button onclick="logoutUser()" 
style="padding:6px 10px;background:#ef4444;border:none;border-radius:6px;color:white;cursor:pointer;">
Logout
</button>
`;
} else {
box.innerHTML = `<a href="login.html">Login</a>`;
}
}

function logoutUser(){
localStorage.removeItem("currentUser");
location.reload();
}

/* =========================
   TOKENS
========================= */
function loadTokens(){
let el = document.getElementById("tokens");
if(!el || !currentUser) return;

el.innerText = "🪙 " + (localStorage.getItem(currentUser+"_tokens") || 0);
}

window.addEventListener("storage",(e)=>{
if(e.key === currentUser+"_tokens"){
loadTokens();
}
});

/* =========================
   THEME CHANGE
========================= */
function setTheme(t){
localStorage.setItem("theme", t);
applyTheme();
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded",()=>{
loadUserUI();
loadTokens();
});

/* =========================
   GLOBAL MUSIC SYNC
========================= */
(function(){
if(window.globalAudio) return;

let a=new Audio();
a.loop=true;

let p=JSON.parse(localStorage.getItem("playlist"))||[];
let t=parseInt(localStorage.getItem("track"))||0;
let v=parseFloat(localStorage.getItem("volume"))||0.5;

if(p.length){
a.src=p[t].data||p[t];
a.volume=v;
a.currentTime=parseFloat(localStorage.getItem("musicTime"))||0;
}

if(localStorage.getItem("musicPlaying")==="true"){
a.play().catch(()=>{});
}

document.addEventListener("click",()=>a.play().catch(()=>{}),{once:true});

setInterval(()=>{
localStorage.setItem("musicTime",a.currentTime);
},500);

window.globalAudio=a;
})();
</script>

</body>
</html>
