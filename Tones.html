<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tones / Colours</title>

<!-- ================= THEME ENGINE ================= -->
<script>
function applyTheme(){

let theme = localStorage.getItem("theme") || "dark";
let root = document.documentElement;

/* DARK BLUE */
if(theme === "dark"){
root.style.setProperty("--bg", "#000");
root.style.setProperty("--panel", "#0a0a0a");
root.style.setProperty("--card", "#1f2937");
root.style.setProperty("--accent", "#3b82f6");
root.style.setProperty("--text", "white");
}

/* LIGHT */
if(theme === "light"){
root.style.setProperty("--bg", "#f3f4f6");
root.style.setProperty("--panel", "#ffffff");
root.style.setProperty("--card", "#e5e7eb");
root.style.setProperty("--accent", "#2563eb");
root.style.setProperty("--text", "#111");
}

/* PINK */
if(theme === "pink"){
root.style.setProperty("--bg", "#1a001f");
root.style.setProperty("--panel", "#2a0a2f");
root.style.setProperty("--card", "#3b0f42");
root.style.setProperty("--accent", "#ff4fa3");
root.style.setProperty("--text", "white");
}

}

/* apply immediately */
applyTheme();

/* live update across tabs/pages */
window.addEventListener("storage",(e)=>{
if(e.key === "theme"){
applyTheme();
}
});
</script>

<style>
body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

/* NAVBAR */
.nav{
width:80%;
margin:20px auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 30px;
border-radius:30px;
background:var(--panel);
box-shadow:0 0 20px rgba(59,130,246,0.4);
}

.nav-center{
display:flex;
gap:40px;
justify-content:center;
flex:1;
}

.nav a{
color:var(--text);
text-decoration:none;
font-size:18px;
padding:8px 14px;
border-radius:10px;
}

.nav a:hover{
background:var(--card);
}

/* USER */
.user-box{
display:flex;
align-items:center;
gap:10px;
}

.user-box img{
width:40px;
height:40px;
border-radius:50%;
}

/* MAIN */
.container{
width:80%;
margin:auto;
margin-top:60px;
text-align:center;
}

/* THEME CARDS */
.card{
display:inline-block;
width:250px;
padding:20px;
margin:15px;
border-radius:20px;
background:var(--panel);
box-shadow:0 0 20px rgba(0,0,0,0.3);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.preview{
height:120px;
border-radius:15px;
margin-bottom:10px;
}

/* PREVIEWS */
.blue{ background:#0a0a0a; border:2px solid #3b82f6; }
.light{ background:#ffffff; border:2px solid #2563eb; }
.pink{ background:#2a0a2f; border:2px solid #ff4fa3; }

/* TOKEN */
.token{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:32px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div></div>

<div class="nav-center">
<a href="index.html">Home</a>
<a href="music.html">Music</a>
<a href="settings.html">Settings</a>
<a href="tones.html">Tones</a>
</div>

<div class="user-box" id="userBox"></div>
</div>

<!-- MAIN -->
<div class="container">

<h1>Choose Your Theme</h1>

<div class="card" onclick="setTheme('dark')">
<div class="preview blue"></div>
<h3>Dark Blue (Default)</h3>
</div>

<div class="card" onclick="setTheme('light')">
<div class="preview light"></div>
<h3>Light Mode</h3>
</div>

<div class="card" onclick="setTheme('pink')">
<div class="preview pink"></div>
<h3>Pink Mode</h3>
</div>

</div>

<div class="token">🪙 0</div>

<!-- 🎧 MUSIC ENGINE -->
<script src="music-engine.js"></script>

<script>

/* USER SYSTEM */
let currentUser = localStorage.getItem("currentUser");
let users = JSON.parse(localStorage.getItem("users")) || {};

function loadUser(){
let box = document.getElementById("userBox");
if(currentUser && users[currentUser]){
box.innerHTML = `<img src="${users[currentUser].pfp}">${currentUser}`;
}
}

/* APPLY THEME */
function setTheme(t){
localStorage.setItem("theme", t);
applyTheme();
}

/* INIT */
loadUser();

/* =========================
   GLOBAL MUSIC SYNC
========================= */

let globalAudio;

function initGlobalMusic(){

if(window.globalAudio) return;

globalAudio = new Audio();
globalAudio.loop = true;

let playlist = JSON.parse(localStorage.getItem("playlist")) || [];
let track = parseInt(localStorage.getItem("track")) || 0;
let volume = parseFloat(localStorage.getItem("volume")) || 0.5;

if(playlist.length){
let song = playlist[track];
globalAudio.src = song.data || song;
globalAudio.volume = volume;

/* 🔥 SYNC POSITION */
let savedTime = parseFloat(localStorage.getItem("musicTime")) || 0;
globalAudio.currentTime = savedTime;
}

if(localStorage.getItem("musicPlaying") === "true"){
globalAudio.play().catch(()=>{});
}

document.addEventListener("click", ()=>{
globalAudio.play().catch(()=>{});
},{once:true});

window.globalAudio = globalAudio;

/* 🔥 SAVE EVERY 0.5s */
setInterval(()=>{
if(globalAudio.src && !isNaN(globalAudio.currentTime)){
localStorage.setItem("track", track);
localStorage.setItem("musicTime", globalAudio.currentTime);
}
},500);

}

initGlobalMusic();

</script>

</body>
</html>
