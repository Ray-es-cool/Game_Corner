<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Signup</title>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-env.js"></script>
<script src="supabase-config.js"></script>
<script src="auth-adapter.js"></script>

<!-- Shared Styles & Animations -->
<link rel="stylesheet" href="styles.css">
<script src="animations.js"></script>

<script>
function applyTheme(){
let theme = localStorage.getItem("theme") || "dark";
let root = document.documentElement;

if(theme === "dark"){
root.style.setProperty("--bg", "#000");
root.style.setProperty("--panel", "#0a0a0a");
root.style.setProperty("--card", "#1f2937");
root.style.setProperty("--accent", "#3b82f6");
root.style.setProperty("--text", "white");
}

if(theme === "light"){
root.style.setProperty("--bg", "#f3f4f6");
root.style.setProperty("--panel", "#ffffff");
root.style.setProperty("--card", "#e5e7eb");
root.style.setProperty("--accent", "#2563eb");
root.style.setProperty("--text", "#111");
}

if(theme === "pink"){
root.style.setProperty("--bg", "#1a001f");
root.style.setProperty("--panel", "#2a0a2f");
root.style.setProperty("--card", "#3b0f42");
root.style.setProperty("--accent", "#ff4fa3");
root.style.setProperty("--text", "white");
}
}
applyTheme();

window.addEventListener("storage",(e)=>{
if(e.key === "theme") applyTheme();
});
</script>

<style>
body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
}

.container{ width:100%; max-width:1200px; }

.nav{
width:80%;
margin:20px auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 30px;
border-radius:30px;
background:var(--panel);
box-shadow:0 0 20px rgba(59,130,246,0.4);
}

.nav-center{
display:flex;
gap:40px;
justify-content:center;
flex:1;
}

.nav a{
color:var(--text);
text-decoration:none;
font-size:18px;
padding:8px 14px;
border-radius:10px;
}

.nav a:hover{ background:var(--card); }

.user-box{
display:flex;
align-items:center;
gap:10px;
}

.main{ text-align:center; margin-top:80px; }

.box{
display:inline-block;
padding:30px;
background:var(--panel);
border-radius:20px;
box-shadow:0 0 20px rgba(59,130,246,0.3);
min-width:320px;
}

input{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:var(--card);
color:var(--text);
box-sizing:border-box;
}

button{
margin-top:15px;
padding:14px;
width:100%;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
cursor:pointer;
}

.logout-btn{ background:#ef4444; margin-top:10px; }

.token{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:32px;
}

.file-label{ margin-top:15px; display:block; text-align:left; }
.file-help{ font-size:13px; opacity:0.8; }
</style>
</head>

<body>

<div class="container">

<div class="nav">
<div></div>

<div class="nav-center">
<a href="index.html">Home</a>
<a href="Games.html">Games</a>
<a href="DailyRewards.html">Daily Rewards</a>
<a href="settings.html">Settings</a>
<a href="login.html">Login</a>
<a href="shop.html">Shop</a>
</div>

<div class="user-box" id="userBox"></div>
</div>

<div class="main">

<div class="box">

<h2>Create Account</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<input id="pfp" placeholder="Profile Picture URL (optional)">

<label class="file-label">Or upload profile picture</label>
<input type="file" id="pfpFile" accept="image/*">
<p class="file-help">Click "Choose File" to upload an image.</p>

<p id="fileName">No file selected</p>

<button onclick="signup()">Create Account</button>

<p id="msg"></p>

</div>
</div>

</div>

<div class="token" id="tokens">🪙 0</div>

<script>

/* =========================
   USER SYSTEM
========================= */
let currentUser = localStorage.getItem("currentUser");

function loadUserUI(){
let box = document.getElementById("userBox");

if(!box) return;

if(currentUser){
box.innerHTML = `
<span>${currentUser}</span>
<button onclick="logoutUser()"
style="padding:6px 10px;background:#ef4444;border:none;border-radius:6px;color:white;cursor:pointer;">
Logout
</button>
`;
} else {
box.innerHTML = `<a href="login.html">Login</a>`;
}
}

function logoutUser(){
if(window.FireDB) FireDB.logout();
localStorage.removeItem("currentUser");
location.reload();
}

/* TOKENS */
function loadTokens(){
let el = document.getElementById("tokens");
if(!el || !currentUser) return;

el.innerText = "🪙 " + (localStorage.getItem(currentUser+"_tokens") || 0);
}

/* =========================
   FILE NAME DISPLAY
========================= */
document.getElementById("pfpFile").addEventListener("change", function(){
let file = this.files[0];
document.getElementById("fileName").innerText =
file ? "Selected: " + file.name : "No file selected";
});

/* =========================
   FILE → BASE64
========================= */
function fileToAvatarDataUrl(file, done){
let reader = new FileReader();
reader.onload = function(e){
let img = new Image();
img.onload = function(){
let canvas = document.createElement("canvas");
canvas.width = 128;
canvas.height = 128;
let ctx = canvas.getContext("2d");
ctx.drawImage(img,0,0,128,128);
done(canvas.toDataURL("image/jpeg",0.8));
};
img.src = e.target.result;
};
reader.readAsDataURL(file);
}

/* =========================
   SIGNUP
========================= */
async function signup(){

let u = document.getElementById("username").value;
let p = document.getElementById("password").value;
let urlPic = document.getElementById("pfp").value;
let file = document.getElementById("pfpFile").files[0];

if(!u || !p){
document.getElementById("msg").innerText = "Fill all fields";
return;
}

let pfp = urlPic || "https://via.placeholder.com/100";

if(file){
await new Promise(resolve => {
fileToAvatarDataUrl(file, (img) => {
pfp = img;
resolve();
});
});
}

try{
const result = await FireDB.createUser(u, p, pfp);

if(result){
localStorage.setItem("currentUser", u);
localStorage.setItem("currentUid", result.uid);
localStorage.setItem(u+"_tokens", 0);
localStorage.setItem("userSync", Date.now());
location.href="index.html";
}else{
document.getElementById("msg").innerText = "Signup failed";
}

}catch(err){
console.error(err);
if(err.code === 'auth/email-already-in-use'){
document.getElementById("msg").innerText = "Username already taken";
}else if(err.code === 'auth/weak-password'){
document.getElementById("msg").innerText = "Password must be at least 6 characters";
}else{
document.getElementById("msg").innerText = "Cannot connect - check Firebase config";
}
}
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded",()=>{
loadUserUI();
loadTokens();
});

</script>

</body>
</html>
