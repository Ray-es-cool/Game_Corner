<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Music</title>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-env.js"></script>
<script src="supabase-config.js"></script>
<script src="auth-adapter.js"></script>

<!-- Shared Styles & Animations -->
<link rel="stylesheet" href="styles.css">
<script src="animations.js"></script>

<script>
// Music is accessible from settings only (no enforcement - direct access)

function applyTheme(){
    let theme = localStorage.getItem("theme") || "dark";
    let root = document.documentElement;

    if(theme === "dark"){
        root.style.setProperty("--bg", "#000");
        root.style.setProperty("--panel", "#0a0a0a");
        root.style.setProperty("--card", "#1f2937");
        root.style.setProperty("--accent", "#3b82f6");
        root.style.setProperty("--text", "white");
    }

    if(theme === "light"){
        root.style.setProperty("--bg", "#f3f4f6");
        root.style.setProperty("--panel", "#ffffff");
        root.style.setProperty("--card", "#e5e7eb");
        root.style.setProperty("--accent", "#2563eb");
        root.style.setProperty("--text", "#111");
    }

    if(theme === "pink"){
        root.style.setProperty("--bg", "#1a001f");
        root.style.setProperty("--panel", "#2a0a2f");
        root.style.setProperty("--card", "#3b0f42");
        root.style.setProperty("--accent", "#ff4fa3");
        root.style.setProperty("--text", "white");
    }
}
applyTheme();

window.addEventListener("storage",(e)=>{
    if(e.key === "theme") applyTheme();
});
</script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

.nav{
    width:80%;
    margin:20px auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    border-radius:30px;
    background:var(--panel);
    box-shadow:0 0 20px rgba(59,130,246,0.4);
}

.nav-center{
    display:flex;
    gap:40px;
    margin:auto;
}

.nav a{
    color:var(--text);
    text-decoration:none;
    font-size:18px;
    padding:8px 14px;
    border-radius:10px;
}

.nav a:hover{
    background:var(--card);
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.container{
    display:flex;
    gap:20px;
    padding:20px;
}

.playlist{
    width:320px;
    background:var(--panel);
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(59,130,246,0.3);
}

.song{
    padding:10px;
    margin:8px 0;
    background:var(--card);
    border-radius:10px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.song:hover{
    background:#374151;
}

.song.selected{
    border:2px solid var(--accent);
}

.song-actions{
    display:flex;
    gap:5px;
}

.song-actions button{
    width:auto;
    margin:0;
    padding:4px 8px;
    font-size:12px;
}

.player{
    flex:1;
    background:var(--panel);
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(59,130,246,0.3);
}

button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    cursor:pointer;
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

/* Music player enhancements */
.song:hover {
    transform: translateX(5px);
}

.song.selected {
    animation: glow 2s ease-in-out infinite;
}

input[type="range"]{
    width:100%;
    margin-top:10px;
}

.token{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:32px;
}

.admin-panel{
    margin-top:20px;
    padding:15px;
    background:var(--card);
    border-radius:10px;
}

.admin-panel h3{
    margin-top:0;
    color:var(--accent);
}

.delete-btn{
    background:#ef4444;
}

.delete-btn:hover{
    background:#dc2626;
}

.controls{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.controls button{
    flex:1;
}

.now-playing{
    font-size:24px;
    font-weight:bold;
    color:var(--accent);
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="nav">
    <div></div>
    <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="Games.html">Games</a>
        <a href="DailyRewards.html">Daily Rewards</a>
        <a href="shop.html">Shop</a>
        <a href="settings.html">Settings</a>
    </div>
    <div class="user-box" id="userBox"></div>
</div>

<div class="container">

    <div class="playlist" id="playlistBox">
        <h3>Playlist</h3>
        <div id="playlistContainer"></div>
    </div>

    <div class="player">
        <div class="now-playing" id="nowPlaying">Nothing playing</div>

        <div class="controls">
            <button onclick="playPrevious()">⏮ Previous</button>
            <button onclick="togglePlay()" id="playPauseBtn">▶ Play</button>
            <button onclick="playNext()">Next ⏭</button>
        </div>

        <label>Volume</label>
        <input type="range" min="0" max="1" step="0.01" id="volume">

        <div id="adminPanel" class="admin-panel" style="display:none;">
            <h3>Game_Master Music Management</h3>
            <p style="font-size:12px;opacity:0.7;">Only Game_Master can upload, delete, or reorder songs</p>

            <label style="display:block;margin-top:10px;">Upload New Song</label>
            <input type="file" id="upload" accept="audio/*" style="margin-top:5px;">
            <input type="text" id="songNameInput" placeholder="Song name (optional)" style="width:100%;padding:8px;margin-top:5px;border-radius:5px;border:none;">
            <button onclick="uploadSong()">Upload Song</button>

            <button onclick="clearAllSongs()" class="delete-btn" style="margin-top:10px;">Clear All Songs</button>
        </div>

    </div>
</div>

<div class="token" id="tokens">🪙 0</div>

<script>

/* =========================
   USER SYSTEM
========================= */
let currentUser = localStorage.getItem("currentUser");
let currentUid = localStorage.getItem("currentUid");
let isAdminUser = false;
let selectedIndex = 0;
let playlist = [];

async function resolveAdmin(){
    isAdminUser = false;
    if(!currentUser || !currentUid || !window.FireDB) return false;
    try{
        const data = await FireDB.getUserData(currentUid);
        isAdminUser = (data?.username === "Game_Master" && currentUser === "Game_Master");
        return isAdminUser;
    }catch(_){
        isAdminUser = false;
        return false;
    }
}

function loadUserUI(){
    let box = document.getElementById("userBox");
    if(!box) return;

    if(currentUser){
        box.innerHTML = `
            <span>${currentUser}</span>
            <button onclick="logoutUser()"
            style="padding:6px 10px;background:#ef4444;border:none;border-radius:6px;color:white;cursor:pointer;">
            Logout
            </button>
        `;
    } else {
        box.innerHTML = `<a href="login.html">Login</a>`;
    }
}

function logoutUser(){
    if(window.FireDB) FireDB.logout();
    localStorage.removeItem("currentUser");
    localStorage.removeItem("currentUid");
    currentUser = null;
    location.reload();
}

function loadTokens(){
    let el = document.getElementById("tokens");
    if(!el || !currentUser) return;
    el.innerText = "🪙 " + (localStorage.getItem(currentUser+"_tokens") || 0);
}

/* =========================
   PLAYLIST MANAGEMENT
========================= */
async function loadPlaylist(){
    try {
        playlist = await FireDB.getPlaylist();
        renderPlaylist();
    } catch(err) {
        console.error("Failed to load playlist:", err);
        document.getElementById("playlistContainer").innerHTML = "<p>Failed to load playlist</p>";
    }
}

function renderPlaylist(){
    const container = document.getElementById("playlistContainer");
    if(!container) return;

    container.innerHTML = "";

    if(playlist.length === 0){
        container.innerHTML = "<p>No songs uploaded yet</p>";
        return;
    }

    playlist.forEach((song, i) => {
        const div = document.createElement("div");
        div.className = "song";
        if(i === selectedIndex) div.classList.add("selected");

        const deleteBtn = isAdminUser
            ? `<button class="delete-btn" onclick="deleteSong('${song.id}', event)">🗑</button>`
            : "";

        div.innerHTML = `
            <span onclick="selectSong(${i})">${song.name}</span>
            <div class="song-actions">
                ${deleteBtn}
            </div>
        `;

        container.appendChild(div);
    });
}

function selectSong(i){
    selectedIndex = i;
    const song = playlist[i];
    document.getElementById("nowPlaying").innerText = "🎵 " + song.name;
    renderPlaylist();
}

/* =========================
   PLAYBACK CONTROLS
========================= */
function getAudio(){
    if(!window.globalAudio){
        window.globalAudio = new Audio();
        window.globalAudio.loop = true;
    }
    return window.globalAudio;
}

function playSelected(){
    if(playlist.length === 0) return;

    const song = playlist[selectedIndex];
    const audio = getAudio();

    audio.src = song.file_data;
    audio.currentTime = 0;
    audio.play().catch(() => {});

    document.getElementById("playPauseBtn").innerText = "⏸ Pause";
    document.getElementById("nowPlaying").innerText = "🎵 " + song.name;

    // Save state to localStorage for cross-page persistence
    localStorage.setItem("currentTrack", song.id);
    localStorage.setItem("musicPlaying", "true");
}

function togglePlay(){
    const audio = getAudio();
    const btn = document.getElementById("playPauseBtn");

    if(playlist.length === 0) return;

    if(audio.paused){
        audio.play().catch(() => {});
        btn.innerText = "⏸ Pause";
        localStorage.setItem("musicPlaying", "true");
    } else {
        audio.pause();
        btn.innerText = "▶ Play";
        localStorage.setItem("musicPlaying", "false");
    }
}

function playNext(){
    if(playlist.length === 0) return;
    selectedIndex = (selectedIndex + 1) % playlist.length;
    selectSong(selectedIndex);
    playSelected();
}

function playPrevious(){
    if(playlist.length === 0) return;
    selectedIndex = (selectedIndex - 1 + playlist.length) % playlist.length;
    selectSong(selectedIndex);
    playSelected();
}

/* =========================
   VOLUME
========================= */
let slider = document.getElementById("volume");

function syncVolume(){
    let v = localStorage.getItem("volume");
    if(v === null) v = 0.5;
    if(slider) slider.value = v;
    const audio = getAudio();
    if(audio) audio.volume = parseFloat(v);
}

if(slider){
    slider.addEventListener("input",(e)=>{
        let v = parseFloat(e.target.value);
        localStorage.setItem("volume", v);
        const audio = getAudio();
        if(audio) audio.volume = v;
    });
}

/* =========================
   ADMIN FUNCTIONS (Game_Master Only)
========================= */
function isAdmin(){
    return isAdminUser;
}

async function uploadSong(){
    if(!isAdmin()){
        alert("Only Game_Master can upload songs");
        return;
    }

    const fileInput = document.getElementById("upload");
    const nameInput = document.getElementById("songNameInput");

    if(fileInput.files.length === 0){
        alert("Please select a song file");
        return;
    }

    const file = fileInput.files[0];
    const songName = nameInput.value || file.name;

    const reader = new FileReader();
    reader.onload = async function(e){
        try {
            const result = await FireDB.uploadMusic(songName, e.target.result, file.type);
            if(result){
                alert("Song uploaded successfully!");
                fileInput.value = "";
                nameInput.value = "";
                loadPlaylist();
            } else {
                alert("Upload failed");
            }
        } catch(err){
            alert("Upload error: " + err.message);
        }
    };
    reader.readAsDataURL(file);
}

async function deleteSong(musicId, event){
    if(event) event.stopPropagation();

    if(!isAdmin()){
        alert("Only Game_Master can delete songs");
        return;
    }

    if(!confirm("Delete this song?")) return;

    try {
        await FireDB.deleteMusic(musicId);
        loadPlaylist();
    } catch(err){
        alert("Delete error: " + err.message);
    }
}

async function clearAllSongs(){
    if(!isAdmin()){
        alert("Only Game_Master can clear playlist");
        return;
    }

    if(!confirm("Delete ALL songs from playlist? This cannot be undone.")) return;

    try {
        await FireDB.clearAllMusic();
        alert("Playlist cleared");
        loadPlaylist();
    } catch(err){
        alert("Clear error: " + err.message);
    }
}

/* =========================
   CROSS-PAGE MUSIC PERSISTENCE
   Music continues playing when navigating between pages
========================= */
function restoreMusicState(){
    const audio = getAudio();
    const savedTrack = localStorage.getItem("currentTrack");
    const isPlaying = localStorage.getItem("musicPlaying") === "true";
    const savedTime = parseFloat(localStorage.getItem("musicTime")) || 0;

    if(savedTrack && playlist.length > 0){
        const trackIndex = playlist.findIndex(s => s.id === savedTrack);
        if(trackIndex !== -1){
            selectedIndex = trackIndex;
            const song = playlist[trackIndex];
            audio.src = song.file_data;
            audio.currentTime = savedTime;

            if(isPlaying){
                audio.play().catch(() => {});
                document.getElementById("playPauseBtn").innerText = "⏸ Pause";
            }

            document.getElementById("nowPlaying").innerText = "🎵 " + song.name;
        }
    }
}

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", async ()=>{
    loadUserUI();
    loadTokens();
    syncVolume();

    await resolveAdmin();
    if(isAdminUser){
        document.getElementById("adminPanel").style.display = "block";
    }

    await loadPlaylist();
    restoreMusicState();

    // Unlock audio on first click
    document.addEventListener("click", ()=>{
        const audio = getAudio();
        if(audio.src) audio.play().catch(() => {});
    }, {once:true});

    // Save playback position periodically
    setInterval(()=>{
        const audio = getAudio();
        if(audio.src && !isNaN(audio.currentTime)){
            localStorage.setItem("musicTime", audio.currentTime);
        }
    }, 1000);
});

</script>

</body>
</html>
