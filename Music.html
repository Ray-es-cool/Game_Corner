<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Music</title>

<script>
function applyTheme(){
    let theme = localStorage.getItem("theme") || "dark";
    let root = document.documentElement;

    if(theme === "dark"){
        root.style.setProperty("--bg", "#000");
        root.style.setProperty("--panel", "#0a0a0a");
        root.style.setProperty("--card", "#1f2937");
        root.style.setProperty("--accent", "#3b82f6");
        root.style.setProperty("--text", "white");
    }

    if(theme === "light"){
        root.style.setProperty("--bg", "#f3f4f6");
        root.style.setProperty("--panel", "#ffffff");
        root.style.setProperty("--card", "#e5e7eb");
        root.style.setProperty("--accent", "#2563eb");
        root.style.setProperty("--text", "#111");
    }

    if(theme === "pink"){
        root.style.setProperty("--bg", "#1a001f");
        root.style.setProperty("--panel", "#2a0a2f");
        root.style.setProperty("--card", "#3b0f42");
        root.style.setProperty("--accent", "#ff4fa3");
        root.style.setProperty("--text", "white");
    }
}
applyTheme();

window.addEventListener("storage",(e)=>{
    if(e.key === "theme") applyTheme();
});
</script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

.nav{
    width:80%;
    margin:20px auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    border-radius:30px;
    background:var(--panel);
    box-shadow:0 0 20px rgba(59,130,246,0.4);
}

.nav-center{
    display:flex;
    gap:40px;
    margin:auto;
}

.nav a{
    color:var(--text);
    text-decoration:none;
    font-size:18px;
    padding:8px 14px;
    border-radius:10px;
}

.nav a:hover{
    background:var(--card);
}

.user-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.container{
    display:flex;
    gap:20px;
    padding:20px;
}

.playlist{
    width:320px;
    background:var(--panel);
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(59,130,246,0.3);
}

.song{
    padding:10px;
    margin:8px 0;
    background:var(--card);
    border-radius:10px;
    cursor:pointer;
}

.song:hover{
    background:#374151;
}

.player{
    flex:1;
    background:var(--panel);
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(59,130,246,0.3);
}

button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    cursor:pointer;
}

input[type="range"]{
    width:100%;
    margin-top:10px;
}

.token{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:32px;
}
</style>
</head>

<body>

<div class="nav">
    <div></div>
    <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="games.html">Games</a>
        <a href="dailyrewards.html">Daily Rewards</a>
        <a href="shop.html">Shop</a>
        <a href="settings.html">Settings</a>
        <a href="music.html">Music</a>
    </div>
    <div class="user-box" id="userBox"></div>
</div>

<div class="container">

    <div class="playlist" id="playlistBox">
        <h3>Playlist</h3>
    </div>

    <div class="player">

        <h3 id="nowPlaying">Nothing playing</h3>

        <button onclick="playSelected()">▶ Play Selected</button>

        <label>Volume</label>
        <input type="range" min="0" max="1" step="0.01" id="volume">

        <div id="adminPanel" style="display:none; margin-top:20px;">
            <h3>Game_Master Upload Songs</h3>
            <input type="file" id="upload" multiple accept="audio/*">
            <button onclick="uploadSongs()">Upload / Replace Playlist</button>
            <button onclick="clearSongs()">Clear Playlist</button>
        </div>

    </div>
</div>

<div class="token" id="tokens">🪙 0</div>

<script>

/* =========================
   USER SYSTEM (GLOBAL)
========================= */
let currentUser = localStorage.getItem("currentUser");

function loadUserUI(){
    let box = document.getElementById("userBox");

    if(!box) return;

    if(currentUser){
        box.innerHTML = `
            <span>${currentUser}</span>
            <button onclick="logoutUser()" 
            style="padding:6px 10px;background:#ef4444;border:none;border-radius:6px;color:white;cursor:pointer;">
            Logout
            </button>
        `;
    } else {
        box.innerHTML = `<a href="login.html">Login</a>`;
    }
}

function logoutUser(){
    localStorage.removeItem("currentUser");
    location.reload();
}

/* TOKENS */
function loadTokens(){
    let el = document.getElementById("tokens");
    if(!el || !currentUser) return;

    el.innerText = "🪙 " + (localStorage.getItem(currentUser+"_tokens") || 0);
}

window.addEventListener("storage",(e)=>{
    if(e.key === currentUser+"_tokens"){
        loadTokens();
    }
});

/* =========================
   PLAYLIST
========================= */
let selectedIndex = 0;

function getPlaylist(){
    return JSON.parse(localStorage.getItem("playlist")) || [];
}

function savePlaylist(list){
    localStorage.setItem("playlist", JSON.stringify(list));
    localStorage.setItem("musicCommand", Date.now());
}

function renderPlaylist(){
    let box = document.getElementById("playlistBox");
    if(!box) return;

    box.innerHTML = "<h3>Playlist</h3>";

    let list = getPlaylist();

    if(list.length === 0){
        box.innerHTML += "<p>No songs uploaded</p>";
        return;
    }

    list.forEach((song, i)=>{
        let div = document.createElement("div");
        div.className = "song";
        div.innerText = song.name;

        div.onclick = ()=>{
            selectedIndex = i;
            document.getElementById("nowPlaying").innerText = song.name;
        };

        box.appendChild(div);
    });
}

/* =========================
   PLAY
========================= */
function playSelected(){
    localStorage.setItem("track", selectedIndex);
    localStorage.setItem("musicPlaying", "true");
    localStorage.setItem("musicCommand", Date.now());
}

/* =========================
   VOLUME
========================= */
let slider = document.getElementById("volume");

function syncVolume(){
    let v = localStorage.getItem("volume");
    if(v === null) v = 0.5;

    if(slider) slider.value = v;

    if(window.globalAudio){
        window.globalAudio.volume = parseFloat(v);
    }
}

if(slider){
    slider.addEventListener("input",(e)=>{
        let v = parseFloat(e.target.value);
        localStorage.setItem("volume", v);

        if(window.globalAudio){
            window.globalAudio.volume = v;
        }
    });
}

/* =========================
   ADMIN
========================= */
function isAdmin(){
    return currentUser === "Game_Master";
}

/* =========================
   UPLOAD
========================= */
async function uploadSongs(){

    if(!isAdmin()){
        alert("Not allowed");
        return;
    }

    let files = Array.from(document.getElementById("upload").files);
    if(!files.length) return;

    let newList = await Promise.all(files.map(file=>{
        return new Promise(resolve=>{
            let reader = new FileReader();
            reader.onload = e => resolve({
                name:file.name,
                data:e.target.result
            });
            reader.readAsDataURL(file);
        });
    }));

    savePlaylist(newList);
    renderPlaylist();
}

/* =========================
   CLEAR
========================= */
function clearSongs(){
    if(!isAdmin()){
        alert("Not allowed");
        return;
    }

    localStorage.removeItem("playlist");
    localStorage.setItem("musicCommand", Date.now());
    renderPlaylist();
}

/* =========================
   GLOBAL MUSIC ENGINE
========================= */
(function(){

    if(window.globalAudio) return;

    let audio = new Audio();
    audio.loop = true;
    window.globalAudio = audio;

    function load(){
        let playlist = getPlaylist();
        let track = parseInt(localStorage.getItem("track")) || 0;
        let volume = parseFloat(localStorage.getItem("volume")) || 0.5;
        let time = parseFloat(localStorage.getItem("musicTime")) || 0;

        let song = playlist[track];
        if(!song) return;

        audio.src = song.data || song;
        audio.volume = volume;
        audio.currentTime = time;

        if(localStorage.getItem("musicPlaying") === "true"){
            audio.play().catch(()=>{});
        }
    }

    window.addEventListener("storage",(e)=>{
        if(e.key === "musicCommand" || e.key === "track"){
            load();
        }
    });

    setInterval(()=>{
        if(audio.src){
            localStorage.setItem("musicTime", audio.currentTime);
        }
    },500);

    document.addEventListener("click",()=>{
        audio.play().catch(()=>{});
    },{once:true});

    load();

})();

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", ()=>{
    renderPlaylist();
    syncVolume();
    loadUserUI();
    loadTokens();

    if(isAdmin()){
        let panel = document.getElementById("adminPanel");
        if(panel) panel.style.display = "block";
    }
});

</script>

</body>
</html>
